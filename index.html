<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ali Kemal Snake.io - İMKANSIZ MOD</title>
<style>
  body { background: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
  canvas { display: block; background: #080808; }
  #ui { position: fixed; top: 20px; left: 20px; z-index: 100; pointer-events: none; }
  #scoreBox { font-size: 35px; color: #00ff00; font-weight: bold; }
  #godTag { display: none; color: white; background: red; padding: 10px 20px; border-radius: 10px; margin-top: 10px; font-weight: bold; border: 3px solid white; box-shadow: 0 0 20px red; }
  #leaderboard { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.85); padding: 15px; border: 3px solid #ffd700; border-radius: 15px; min-width: 200px; }
  .row { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; font-size: 16px; }
  #menu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 200; background: #1a1a1a; padding: 40px; border-radius: 30px; text-align: center; border: 6px solid #ffd700; min-width: 350px; }
  input { font-size: 20px; padding: 12px; border-radius: 10px; margin: 10px; text-align: center; width: 80%; background: #000; color: #fff; border: 2px solid #444; }
  select { font-size: 18px; padding: 10px; border-radius: 10px; width: 85%; background: #333; color: white; border: 2px solid #ffd700; }
  button { font-size: 25px; padding: 15px 50px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 15px; font-weight: bold; margin-top: 15px; }
</style>
</head>
<body>

<div id="ui">
    <div id="scoreBox">Puan: 0</div>
    <div id="godTag">🛡️ ÖLÜMSÜZ MOD AKTİF</div>
</div>

<div id="leaderboard">
    <h3 style="margin:0 0 10px 0; color:#ffd700; text-align:center;">LİDERLER</h3>
    <div id="leaderRows"></div>
</div>

<div id="menu">
  <h1 style="color:#ffd700; margin:0;">SNAKE.IO</h1>
  <input type="text" id="nameInput" placeholder="İsmin..." maxlength="15">
  <div style="margin:15px 0;">
    <select id="difficulty">
      <option value="4.5">KOLAY (Sakin)</option>
      <option value="9.5">ZOR (Tehlikeli)</option>
      <option value="13.5">🔥🔥 İMKANSIZ 🔥🔥</option>
    </select>
  </div>
  <button onclick="startGame()">BAŞLAT</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const WORLD_SIZE = 3500;
const BOT_COUNT = 18;

let snakes = [], particles = [], gameActive = false, turnDir = 0, godMode = false, isAdmin = false;
let camera = { x: 0, y: 0 };
let currentSpeed = 6.5;

const botNames = ["Kerem", "Efe", "Zeynep", "Mert", "Arda", "Can", "Elif", "Deniz", "Selim", "Melis", "Emre", "Burak", "Selin", "Kaan", "Umut", "Bora"];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

function getRandomColor() {
    return `hsl(${Math.random() * 360}, 85%, 60%)`;
}

function createBot() {
    return {
        name: botNames[Math.floor(Math.random()*botNames.length)] + "_" + (Math.floor(Math.random()*90)+10),
        color: getRandomColor(),
        x: Math.random()*(WORLD_SIZE-400)+200, 
        y: Math.random()*(WORLD_SIZE-400)+200,
        angle: Math.random()*Math.PI*2, 
        score: Math.floor(Math.random()*15)+5, 
        segments: [], 
        alive: true, 
        isBot: true
    };
}

function dropLoot(snake) {
    for(let i = 0; i < snake.segments.length; i += 2) {
        let seg = snake.segments[i];
        particles.push({
            x: seg.x + (Math.random()-0.5)*30,
            y: seg.y + (Math.random()-0.5)*30,
            color: snake.color,
            size: 8
        });
    }
}

function startGame() {
    let rawName = document.getElementById("nameInput").value.trim();
    currentSpeed = parseFloat(document.getElementById("difficulty").value);
    
    // SADECE ALİ KEMAL ADMİN OLABİLİR
    if(rawName === "Ali Kemal") { 
        isAdmin = true; 
        rawName = "Ali Kemal [Admin]"; 
    } else {
        isAdmin = false;
    }
    
    godMode = false; // Başlarken ölümsüzlük kapalı
    document.getElementById("menu").style.display = "none";
    gameActive = true;
    init(rawName || "Oyuncu");
}

function init(pName) {
    snakes = []; particles = [];
    snakes.push({
        name: pName, color: isAdmin ? "#00ff00" : getRandomColor(),
        x: WORLD_SIZE/2, y: WORLD_SIZE/2, angle: 0, score: 0, segments: [], alive: true, isBot: false
    });
    for(let i=0; i<BOT_COUNT; i++) snakes.push(createBot());
    for(let i=0; i<850; i++) spawnParticle();
    requestAnimationFrame(loop);
}

function spawnParticle() {
    particles.push({
        x: Math.random()*(WORLD_SIZE-100)+50,
        y: Math.random()*(WORLD_SIZE-100)+50,
        color: getRandomColor(),
        size: 6
    });
}

// KLAVYE KONTROLLERİ
window.addEventListener('keydown', (e) => {
    let k = e.key.toLowerCase();
    if(k === "arrowleft") turnDir = -0.12;
    if(k === "arrowright") turnDir = 0.12;
    
    // G TUŞU ÇALIŞTIRMA (Admin ise)
    if(k === "g" && isAdmin) {
        godMode = !godMode;
        document.getElementById("godTag").style.display = godMode ? "block" : "none";
    }
});
window.addEventListener('keyup', () => turnDir = 0);

function loop() {
    if(!gameActive) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    let player = snakes.find(s => !s.isBot && s.alive);

    for(let i = 0; i < snakes.length; i++) {
        let s = snakes[i];
        if(!s.alive) {
            if(s.isBot) { dropLoot(s); snakes[i] = createBot(); }
            continue;
        }
        
        if (s.isBot) {
            // BOT AI - İMKANSIZ MODDA ÇOK DAHA AGRESİF
            let distToPlayer = player ? Math.hypot(player.x - s.x, player.y - s.y) : 9999;
            
            // Algılama mesafesi zorluğa göre artar
            let detectionRange = currentSpeed > 10 ? 2500 : 800;

            if (player && distToPlayer < detectionRange) {
                let targetAngle = Math.atan2(player.y - s.y, player.x - s.x);
                let diff = targetAngle - s.angle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                // İmkansız modda botlar çok daha keskin döner
                s.angle += diff * (currentSpeed > 10 ? 0.15 : 0.08);
            } else {
                s.angle += (Math.random() - 0.5) * 0.2;
            }
            // Duvar koruması
            if (s.x < 100 || s.x > WORLD_SIZE - 100 || s.y < 100 || s.y > WORLD_SIZE - 100) s.angle += 0.3;
        } else {
            s.angle += turnDir;
        }

        s.x += Math.cos(s.angle) * currentSpeed;
        s.y += Math.sin(s.angle) * currentSpeed;

        // ÖLÜM VE ÖLÜMSÜZLÜK KONTROLÜ
        if(s.x < 0 || s.x > WORLD_SIZE || s.y < 0 || s.y > WORLD_SIZE) {
            if(s.isBot || !godMode) {
                s.alive = false;
                if(!s.isBot) { dropLoot(s); setTimeout(() => location.reload(), 800); }
            } else {
                if(s.x < 0) s.x = 0; if(s.x > WORLD_SIZE) s.x = WORLD_SIZE;
                if(s.y < 0) s.y = 0; if(s.y > WORLD_SIZE) s.y = WORLD_SIZE;
            }
        }

        s.segments.unshift({x: s.x, y: s.y});
        if(s.segments.length > s.score + 15) s.segments.pop();

        // Yem yeme
        for(let j = particles.length - 1; j >= 0; j--) {
            let p = particles[j];
            if(Math.hypot(s.x-p.x, s.y-p.y) < 25) {
                particles.splice(j, 1);
                s.score++;
                if(!s.isBot) document.getElementById("scoreBox").innerText = "Puan: " + s.score;
                if(particles.length < 900) spawnParticle();
            }
        }

        // Çarpışma: Kafayı bir yere vurma
        snakes.forEach(other => {
            if(s === other || !other.alive) return;
            other.segments.forEach((p, idx) => {
                if(idx > 5 && Math.hypot(s.x - p.x, s.y - p.y) < 14) {
                    if(s.isBot || !godMode) {
                        s.alive = false;
                        if(!s.isBot) { dropLoot(s); setTimeout(() => location.reload(), 800); }
                    }
                }
            });
        });
    }

    if(player) { camera.x = player.x - canvas.width/2; camera.y = player.y - canvas.height/2; }

    let sorted = [...snakes].filter(s => s.alive).sort((a,b) => b.score - a.score).slice(0, 5);
    let html = "";
    sorted.forEach((s, i) => {
        html += `<div class="row" style="color:${s.color}"><span>${i+1}. ${s.name}</span><span>${s.score}</span></div>`;
    });
    document.getElementById("leaderRows").innerHTML = html;
}

function draw() {
    ctx.fillStyle = "#080808"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save(); ctx.translate(-camera.x, -camera.y);
    ctx.strokeStyle = "red"; ctx.lineWidth = 20; ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);

    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2); ctx.fill();
    });

    snakes.forEach(s => {
        if(!s.alive) return;
        ctx.fillStyle = s.color;
        if(!s.isBot && godMode) { ctx.shadowBlur = 20; ctx.shadowColor = "white"; }
        s.segments.forEach((seg, i) => {
            ctx.beginPath(); ctx.arc(seg.x, seg.y, i === 0 ? 18 : 14, 0, Math.PI*2); ctx.fill();
        });
        ctx.shadowBlur = 0; ctx.fillStyle = "white"; ctx.font = "bold 16px Arial";
        ctx.fillText(s.name, s.x - 30, s.y - 30);
    });
    ctx.restore();
}
</script>
</body>
</html>
