<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ali Kemal Snake - Pro Edition</title>
<style>
  body { background: #111; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; overflow: hidden; }
  canvas { background: black; display: block; margin: 10px auto; border: 4px solid #333; box-shadow: 0 0 20px rgba(0,255,0,0.1); }
  
  .screen { display: none; padding: 50px; }
  .active { display: block; }
  
  input { 
    font-size: 18px; padding: 12px; border-radius: 8px; border: none; margin: 10px; 
    width: 250px; text-align: center; background: #222; color: white; border: 2px solid #444;
  }
  
  button { 
    font-size: 20px; padding: 12px 30px; margin: 10px; cursor: pointer; 
    border-radius: 8px; background: #28a745; color: white; border: none; transition: 0.3s;
  }
  button:hover { background: #218838; transform: scale(1.05); }

  #status { font-weight: bold; color: #FFD700; }
  #adminBadge { color: #FFD700; font-size: 24px; display: none; margin-bottom: 15px; }
  
  #controls { display: none; margin-top: 10px; }
  @media (max-width: 768px) { #controls { display: block; } }
</style>
</head>
<body style="touch-action: none;">

<div id="menu" class="screen active">
  <div id="adminBadge">👑 ADMIN MODU AKTİF 👑</div>
  <h1>Ali Kemal Snake</h1>
  <p>İsmini yaz ve oyuna başla:</p>
  <input type="text" id="nameInput" placeholder="Buraya yaz..." maxlength="15"><br>
  <button onclick="goGame()">BAŞLAT</button>
</div>

<div id="gameScreen" class="screen">
  <h2 id="gameTitle">Normal Mod</h2>
  <p>Skor: <span id="score">0</span> | <span id="playerInfo">Oyuncu: -</span></p>
  <canvas id="game" width="400" height="400"></canvas>
  
  <div id="controls">
    <button onclick="setDir('UP')">⬆️</button><br>
    <button onclick="setDir('LEFT')">⬅️</button>
    <button onclick="setDir('DOWN')">⬇️</button>
    <button onclick="setDir('RIGHT')">➡️</button>
  </div>
  <br>
  <button id="restartBtn" onclick="startGame()" style="display:none; background: #dc3545;">YENİDEN DENE</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const box = 20;

let snake, food, direction, score, game;
let isGodMode = false;
let isAdmin = false;

function goGame() {
  const name = document.getElementById("nameInput").value.trim();
  
  // SADECE ALİ KEMAL ADINI YAZAN ADMIN OLUR
  if (name.toLowerCase() === "ali kemal" || name.toLowerCase() === "alikemal") {
      isAdmin = true;
      document.getElementById("playerInfo").innerHTML = "<span id='status'>👑 ADMIN</span>";
      alert("Hoş geldin Ali Kemal! Oyun içinde 'L' tuşu ile duvarlardan geçişi açabilirsin.");
  } else {
      document.getElementById("playerInfo").innerText = "Oyuncu: " + (name || "Misafir");
  }

  document.getElementById("menu").classList.remove("active");
  document.getElementById("gameScreen").classList.add("active");
  startGame();
}

function startGame() {
  snake = [{x: 9 * box, y: 9 * box}];
  direction = "RIGHT";
  score = 0;
  isGodMode = false;
  document.getElementById("score").innerText = score;
  document.getElementById("restartBtn").style.display = "none";
  document.getElementById("gameTitle").innerText = "Normal Mod";
  document.getElementById("gameTitle").style.color = "white";
  
  spawnFood();
  clearInterval(game);
  game = setInterval(draw, 120);
}

function spawnFood() {
    food = {
        x: Math.floor(Math.random() * 19) * box,
        y: Math.floor(Math.random() * 19) * box
    };
}

function setDir(dir) { direction = dir; }

document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
  if (e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
  if (e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
  if (e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
  
  // ADMIN HİLESİ: SADECE ADMIN "L" TUŞUNA BASINCA IŞINLANMA AÇILIR
  if (e.key.toLowerCase() === 'l' && isAdmin) {
      isGodMode = !isGodMode;
      document.getElementById("gameTitle").innerText = isGodMode ? "🚀 ADMIN: IŞINLANMA AÇIK" : "Normal Mod";
      document.getElementById("gameTitle").style.color = isGodMode ? "cyan" : "white";
  }
});

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Yılanı ve elmayı çiz
  snake.forEach((p, index) => {
      ctx.fillText(index === 0 ? "🐲" : "🟢", p.x, p.y + 18);
  });
  ctx.fillText("🍎", food.x, food.y + 18);

  let headX = snake[0].x;
  let headY = snake[0].y;

  if (direction === "LEFT") headX -= box;
  if (direction === "UP") headY -= box;
  if (direction === "RIGHT") headX += box;
  if (direction === "DOWN") headY += box;

  // IŞINLANMA VEYA ÖLME KONTROLÜ
  if (isGodMode) {
      // Ölümsüzlük (Admin Hilesi) açıksa: Duvarın içinden geç diğer taraftan çık
      if (headX < 0) headX = canvas.width - box;
      else if (headX >= canvas.width) headX = 0;
      if (headY < 0) headY = canvas.height - box;
      else if (headY >= canvas.height) headY = 0;
  } else {
      // Normal Mod: Duvara veya kendine çarparsan ölürsün
      if (headX < 0 || headY < 0 || headX >= canvas.width || headY >= canvas.height || snake.some(p => p.x === headX && p.y === headY)) {
        clearInterval(game);
        document.getElementById("restartBtn").style.display = "inline-block";
        document.getElementById("gameTitle").innerText = "OYUN BİTTİ";
        return;
      }
  }

  if (headX === food.x && headY === food.y) {
    score++;
    document.getElementById("score").innerText = score;
    spawnFood();
  } else {
    snake.pop();
  }

  snake.unshift({x: headX, y: headY});
}
</script>
</body>
</html>
