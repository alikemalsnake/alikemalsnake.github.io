<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ali Kemal Snake.io - Karakter Fix</title>
<style>
  body { background: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
  canvas { background: #050505; display: block; }
  
  /* SKOR TABLOSU */
  #leaderboard { 
    position: fixed; top: 15px; right: 15px; 
    background: rgba(0,0,0,0.85); padding: 12px; 
    border: 2px solid #ffd700; border-radius: 10px; 
    min-width: 180px; z-index: 100;
  }
  .row { display: flex; justify-content: space-between; margin-bottom: 3px; font-weight: bold; font-size: 14px; }

  /* BİLGİ PANELİ */
  #ui { position: fixed; top: 15px; left: 15px; z-index: 100; pointer-events: none; }
  #scoreBox { font-size: 28px; color: #00ff00; font-weight: bold; }
  #godTag { display: none; color: #fff; background: #ff0000; padding: 5px 10px; border-radius: 5px; margin-top: 5px; font-weight: bold; border: 2px solid white; }

  /* GİRİŞ EKRANI */
  #menu { 
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
    z-index: 200; background: #111; padding: 30px; border-radius: 20px; 
    text-align: center; border: 4px solid #ffd700;
  }
  button { font-size: 20px; padding: 12px 35px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; }
  input { font-size: 18px; padding: 10px; border-radius: 8px; margin: 10px; text-align: center; border: 2px solid #444; background: #000; color: white; }
</style>
</head>
<body>

<div id="ui">
    <div id="scoreBox">Puan: 0</div>
    <div id="godTag">🛡️ ÖLÜMSÜZ MOD</div>
</div>

<div id="leaderboard">
    <div id="leaderRows"></div>
</div>

<div id="menu">
  <h1 style="color:#ffd700; margin: 0;">SNAKE.IO</h1>
  <p style="color:#888;">İsmini yaz:</p>
  <input type="text" id="nameInput" placeholder="Ali Kemal" maxlength="15">
  <br>
  <button onclick="startGame()">OYUNU BAŞLAT</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const WORLD_SIZE = 3000;

let snakes = [], particles = [], gameActive = false, turnDir = 0, godMode = false, isAdmin = false;
let camera = { x: 0, y: 0 };

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

function startGame() {
    let inputName = document.getElementById("nameInput").value.trim();
    if(inputName === "Ali Kemal") {
        isAdmin = true;
        inputName = "Ali Kemal [Admin]";
    } else {
        isAdmin = false;
    }
    document.getElementById("menu").style.display = "none";
    gameActive = true;
    init(inputName);
}

function init(pName) {
    snakes = []; particles = [];
    // Karakter başlangıç (Tam Orta)
    snakes.push({
        name: pName, color: isAdmin ? "#00ff00" : "#00aaff",
        x: WORLD_SIZE/2, y: WORLD_SIZE/2, angle: 0, score: 0, segments: [], alive: true
    });

    for(let i=0; i<15; i++) {
        snakes.push({
            name: "Bot_"+i, color: "red",
            x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE,
            angle: Math.random()*6, score: 3, segments: [], alive: true, isBot: true
        });
    }
    for(let i=0; i<400; i++) particles.push({x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE, color: "yellow"});
    requestAnimationFrame(loop);
}

window.onkeydown = (e) => {
    let k = e.key.toLowerCase();
    if(k === "arrowleft" || k === "j") turnDir = -0.08;
    if(k === "arrowright" || k === "l") turnDir = 0.08;
    if(k === "g" && isAdmin) {
        godMode = !godMode;
        document.getElementById("godTag").style.display = godMode ? "block" : "none";
    }
};
window.onkeyup = () => { turnDir = 0; };

function loop() {
    if(!gameActive) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    snakes.forEach(s => {
        if(!s.alive) return;
        if(s.isBot) s.angle += (Math.random()-0.5)*0.2; else s.angle += turnDir;
        
        s.x += Math.cos(s.angle) * 5;
        s.y += Math.sin(s.angle) * 5;

        // Kenar Kontrolü
        if(s.x < 0) s.x = WORLD_SIZE; if(s.x > WORLD_SIZE) s.x = 0;
        if(s.y < 0) s.y = WORLD_SIZE; if(s.y > WORLD_SIZE) s.y = 0;

        s.segments.unshift({x: s.x, y: s.y});
        if(s.segments.length > s.score + 10) s.segments.pop();

        // Yem yeme
        particles.forEach((p, i) => {
            if(Math.hypot(s.x-p.x, s.y-p.y) < 20) {
                particles.splice(i, 1);
                s.score++;
                if(!s.isBot) document.getElementById("scoreBox").innerText = "Puan: " + s.score;
                particles.push({x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE, color: "yellow"});
            }
        });
    });

    // Kamera Takibi
    let me = snakes[0];
    camera.x = me.x - canvas.width/2;
    camera.y = me.y - canvas.height/2;

    // Skor Tablosu Güncelleme
    let sorted = [...snakes].sort((a,b) => b.score - a.score).slice(0, 5);
    let html = "";
    sorted.forEach((s, i) => {
        html += `<div class="row" style="color:${s.name.includes('Admin')?'#ffd700':'white'}"><span>${i+1}. ${s.name}</span><span>${s.score}</span></div>`;
    });
    document.getElementById("leaderRows").innerHTML = html;
}

function draw() {
    ctx.fillStyle = "#050505";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // Dünya Sınırı
    ctx.strokeStyle = "#333";
    ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);

    // Yemler
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, 7); ctx.fill();
    });

    // Yılanlar
    snakes.forEach(s => {
        if(!s.alive) return;
        ctx.fillStyle = s.color;
        s.segments.forEach((seg, i) => {
            ctx.beginPath();
            ctx.arc(seg.x, seg.y, i === 0 ? 15 : 12, 0, 7);
            ctx.fill();
        });
        ctx.fillStyle = "white";
        ctx.font = "bold 14px Arial";
        ctx.fillText(s.name, s.x - 20, s.y - 20);
    });

    ctx.restore();
}
</script>
</body>
</html>
