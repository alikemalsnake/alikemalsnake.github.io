<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ali Kemal Snake.io - 360° Smooth</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  body { background: #050505; color: white; font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none; }
  #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
  canvas { background: #0a0a0a; position: absolute; border: 15px solid #222; }
  .screen { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; background: rgba(0,0,0,0.9); padding: 40px; border-radius: 30px; text-align: center; border: 3px solid #00ff00; }
  input { font-size: 20px; padding: 12px; border-radius: 10px; border: none; margin: 15px; width: 220px; text-align: center; background: #222; color: white; }
  button { font-size: 22px; padding: 12px 35px; border-radius: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
  #ui { position: fixed; top: 20px; left: 20px; z-index: 50; pointer-events: none; }
  #leaderboard { position: fixed; top: 20px; right: 20px; z-index: 50; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; border-right: 4px solid #00ff00; text-align: right; min-width: 120px; }

  /* MOBİL TUŞLAR (SADECE TELEFONDA) */
  .controls { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); display: none; grid-template-columns: repeat(3, 1fr); gap: 20px; z-index: 150; }
  @media (max-width: 768px) { .controls { display: grid; } }
  .btn-dir { width: 75px; height: 75px; background: rgba(255,255,255,0.1); border: 2px solid #555; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; }
</style>
</head>
<body>

<div id="ui">
    <div id="scoreBox" style="font-size: 32px; color: #00ff00; text-shadow: 0 0 10px #00ff00;">Puan: 0</div>
    <div id="adminTag" style="color: gold; font-weight: bold; font-size: 18px;"></div>
</div>

<div id="leaderboard">
    <div style="color: #00ff00; font-weight: bold; margin-bottom: 5px;">TOP 5</div>
    <div id="rankList"></div>
</div>

<div id="menu" class="screen">
  <h1 style="color:#00ff00; font-size: 40px;">SNAKE.IO 360°</h1>
  <input type="text" id="nameInput" placeholder="İsmin..." maxlength="10"><br>
  <button onclick="startGame()">SAVAŞA BAŞLA</button>
</div>

<div id="viewport">
    <canvas id="gameCanvas"></canvas>
</div>

<div class="controls">
    <div style="grid-column:2" class="btn-dir" onpointerdown="changeAngle(-0.2)" onpointerup="changeAngle(0)">⬅️</div>
    <div style="grid-column:3" class="btn-dir" onpointerdown="changeAngle(0.2)" onpointerup="changeAngle(0)">➡️</div>
    <div style="grid-column:2; margin-top:10px; background:rgba(40,167,69,0.3);" class="btn-dir" onpointerdown="isBoosting=true" onpointerup="isBoosting=false">🚀</div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const WORLD_SIZE = 3000;
canvas.width = WORLD_SIZE; canvas.height = WORLD_SIZE;

let snakes = [];
let particles = [];
let isAdmin = false;
let isGodMode = false;
let gameActive = false;
let isBoosting = false;
let turnSpeed = 0;

function startGame() {
    const name = document.getElementById("nameInput").value.trim() || "Oyuncu";
    if (name.toLowerCase() === "ali kemal") {
        isAdmin = true;
        document.getElementById("adminTag").innerText = "👑 ADMIN";
    }
    document.getElementById("menu").style.display = "none";
    gameActive = true;
    init(name);
}

function init(pName) {
    snakes = [createSnake(pName, "#00ff00", false)];
    for(let i=0; i<15; i++) snakes.push(createSnake("Bot_"+i, `hsl(${Math.random()*360}, 70%, 50%)`, true));
    for(let i=0; i<300; i++) spawnParticle();
    requestAnimationFrame(loop);
}

function createSnake(name, color, isBot) {
    return {
        name, color, isBot,
        alive: true,
        x: Math.random() * WORLD_SIZE,
        y: Math.random() * WORLD_SIZE,
        angle: Math.random() * Math.PI * 2,
        speed: 4,
        score: 0,
        segments: [],
        size: 15
    };
}

function spawnParticle() {
    particles.push({
        x: Math.random() * WORLD_SIZE,
        y: Math.random() * WORLD_SIZE,
        color: `hsl(${Math.random()*360}, 100%, 60%)`,
        size: Math.random() * 4 + 2
    });
}

function changeAngle(val) { turnSpeed = val; }

document.addEventListener("keydown", e => {
    if(e.key === "ArrowLeft") turnSpeed = -0.15;
    if(e.key === "ArrowRight") turnSpeed = 0.15;
    if(e.key === " ") isBoosting = true;
    if(e.key.toLowerCase() === 'l' && isAdmin) {
        isGodMode = !isGodMode;
        document.getElementById("adminTag").innerText = isGodMode ? "🚀 ÖLÜMSÜZ" : "👑 ADMIN";
    }
});
document.addEventListener("keyup", e => {
    if(e.key === "ArrowLeft" || e.key === "ArrowRight") turnSpeed = 0;
    if(e.key === " ") isBoosting = false;
});

function loop() {
    if(!gameActive) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    snakes.forEach(s => {
        if(!s.alive) return;

        // Dönüş Kontrolü
        if(s.isBot) {
            if(Math.random() < 0.05) s.angle += (Math.random() - 0.5) * 1;
        } else {
            s.angle += turnSpeed;
        }

        // Hareket
        let currentSpeed = (isBoosting && !s.isBot) ? s.speed * 2 : s.speed;
        s.x += Math.cos(s.angle) * currentSpeed;
        s.y += Math.sin(s.angle) * currentSpeed;

        // Duvarlar
        if(s.x < 0 || s.x > WORLD_SIZE || s.y < 0 || s.y > WORLD_SIZE) {
            if(!(isGodMode && !s.isBot)) s.alive = false;
        }

        // Gövdeyi Güncelle (Yumuşak takip)
        s.segments.unshift({x: s.x, y: s.y});
        if(s.segments.length > (s.score / 5) + 10) s.segments.pop();

        // Yemek Yeme
        particles.forEach((p, i) => {
            let dist = Math.hypot(s.x - p.x, s.y - p.y);
            if(dist < 20) {
                particles.splice(i, 1);
                s.score += 10;
                if(!s.isBot) document.getElementById("scoreBox").innerText = "Puan: " + s.score;
                spawnParticle();
            }
        });

        // Çarpışma
        snakes.forEach(other => {
            if(s === other || !other.alive) return;
            other.segments.slice(5).forEach(part => {
                let dist = Math.hypot(s.x - part.x, s.y - part.y);
                if(dist < 15 && !(isGodMode && !s.isBot)) s.alive = false;
            });
        });

        if(!s.alive) {
            s.segments.forEach(p => { if(Math.random() < 0.5) spawnParticle(p.x, p.y); });
        }
    });

    let sorted = [...snakes].sort((a,b) => b.score - a.score).slice(0, 5);
    document.getElementById("rankList").innerHTML = sorted.map(s => `<div>${s.name}: ${s.score}</div>`).join("");
}

function draw() {
    ctx.fillStyle = "#0a0a0a";
    ctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);

    // Kareli Zemin
    ctx.strokeStyle = "#151515";
    for(let i=0; i<WORLD_SIZE; i+=50) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, WORLD_SIZE); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(WORLD_SIZE, i); ctx.stroke();
    }

    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    });

    snakes.forEach(s => {
        if(!s.alive) return;
        ctx.fillStyle = s.color;
        s.segments.forEach((p, i) => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, s.size - (i*0.1 > 10 ? 10 : i*0.1), 0, Math.PI*2);
            ctx.fill();
        });
        ctx.fillStyle = "white";
        ctx.fillText(s.name, s.x - 10, s.y - 20);
    });

    const myS = snakes[0];
    const v = document.getElementById("viewport");
    canvas.style.left = (v.offsetWidth/2 - myS.x) + "px";
    canvas.style.top = (v.offsetHeight/2 - myS.y) + "px";
}
</script>
</body>
</html>
