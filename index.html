<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ali Kemal Snake.io - Pro</title>
<style>
  body { background: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none; }
  canvas { display: block; background: #050505; }
  #ui { position: fixed; top: 10px; left: 10px; z-index: 100; pointer-events: none; }
  #scoreBox { font-size: 26px; color: #00ff00; font-weight: bold; text-shadow: 2px 2px #000; }
  #adminTag { display: none; color: #00ffff; font-weight: bold; font-size: 18px; margin-top: 5px; text-shadow: 0 0 10px #00ffff; }
  #leaderboard { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.85); padding: 12px; border: 2px solid #ffd700; border-radius: 12px; min-width: 160px; }
  .row { display: flex; justify-content: space-between; font-weight: bold; font-size: 13px; margin-bottom: 3px; }
  #menu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 200; background: rgba(10, 10, 10, 0.98); padding: 30px; border-radius: 25px; text-align: center; border: 4px solid #ffd700; width: 85%; max-width: 350px; }
  input { font-size: 18px; padding: 12px; border-radius: 10px; margin-bottom: 15px; text-align: center; width: 85%; background: #111; color: #fff; border: 2px solid #333; outline: none; }
  input::placeholder { color: #888; }
  .diff-box { display: flex; flex-direction: column; gap: 10px; }
  .diff-btn { padding: 14px; border-radius: 12px; border: none; font-weight: bold; font-size: 17px; cursor: pointer; color: white; transition: 0.2s; }
  .easy { background: #28a745; }
  .medium { background: #ffc107; color: black; }
  .hard { background: #dc3545; }
  #controls { position: fixed; bottom: 40px; left: 0; right: 0; display: flex; justify-content: space-around; z-index: 150; }
  .btn { width: 80px; height: 80px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; border: 2px solid rgba(255,255,255,0.2); user-select: none; }
</style>
</head>
<body>

<div id="ui">
    <div id="scoreBox">Puan: 0</div>
    <div id="adminTag">🛡️ SÜPER MOD AKTİF</div>
</div>

<div id="leaderboard"><div id="leaderRows"></div></div>

<div id="menu">
  <h1 style="color:#ffd700; margin-top: 0;">SNAKE.IO</h1>
  <input type="text" id="nameInput" placeholder="AD GİR" maxlength="15">
  <div class="diff-box">
    <button class="diff-btn easy" onclick="startGame('easy')">KOLAY</button>
    <button class="diff-btn medium" onclick="startGame('medium')">ORTA</button>
    <button class="diff-btn hard" onclick="startGame('hard')">İMKANSIZ 💀</button>
  </div>
</div>

<div id="controls">
    <div class="btn" id="leftBtn">◀</div>
    <div class="btn" id="rightBtn">▶</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const WORLD_SIZE = 3600;

let snakes = [], particles = [], turnDir = 0, isAdmin = false;
let camera = { x: 0, y: 0 }, gameDiff = 'medium';
let moveSpeed = 10;
let botNames = ["Efe", "Can", "Arda", "Zeynep", "Mert", "Nil", "Sarp", "Mira", "Ada", "Kaan"];

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = resize; resize();

function spawnParticle(x = null, y = null, color = null) {
    return { 
        x: x ?? Math.random() * (WORLD_SIZE - 60) + 30, 
        y: y ?? Math.random() * (WORLD_SIZE - 60) + 30, 
        color: color ?? `hsl(${Math.random() * 360}, 90%, 60%)`,
        size: 6
    };
}

function spawnBot() {
    return {
        name: botNames[Math.floor(Math.random()*botNames.length)] + "_" + Math.floor(Math.random()*99),
        color: `hsl(${Math.random()*360}, 70%, 50%)`,
        x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE,
        angle: Math.random()*Math.PI*2, score: 20, segments: [], alive: true, isBot: true, aiTimer: 0
    };
}

for(let i=0; i<15; i++) snakes.push(spawnBot());
for(let i=0; i<300; i++) particles.push(spawnParticle());

function startGame(mode) {
    gameDiff = mode;
    let name = document.getElementById("nameInput").value.trim();
    
    // ADMIN KONTROLÜ
    if(name === "Ali Kemal" || name === "Alihan Yeşil") {
        isAdmin = true;
        document.getElementById("adminTag").style.display = "block";
        moveSpeed = 22; // NORMALDEN 2 KAT DAHA HIZLI
    } else {
        isAdmin = false;
        document.getElementById("adminTag").style.display = "none";
        moveSpeed = mode === 'easy' ? 7 : mode === 'medium' ? 10 : 15;
    }

    snakes = snakes.filter(s => s.isBot);
    snakes.push({ name: name || "Oyuncu", color: isAdmin ? "#00ffff" : "#ff5500", x: WORLD_SIZE/2, y: WORLD_SIZE/2, angle: 0, score: 0, segments: [], alive: true, isBot: false });
    document.getElementById("menu").style.display = "none";
}

function update() {
    let player = snakes.find(s => !s.isBot && s.alive);
    if(player) { camera.x = player.x - canvas.width/2; camera.y = player.y - canvas.height/2; }

    snakes.forEach(s => {
        if(!s.alive) { if(s.isBot) { Object.assign(s, spawnBot()); s.segments = []; } return; }
        
        if(s.isBot) {
            s.aiTimer--;
            if(s.aiTimer <= 0) {
                let target = particles[Math.floor(Math.random()*particles.length)];
                if(target) s.targetAngle = Math.atan2(target.y - s.y, target.x - s.x);
                s.aiTimer = 60;
            }
            let diff = s.targetAngle - s.angle;
            while(diff < -Math.PI) diff += Math.PI*2;
            while(diff > Math.PI) diff -= Math.PI*2;
            s.angle += diff * 0.1;
        } else { s.angle += turnDir; }

        s.x += Math.cos(s.angle) * moveSpeed;
        s.y += Math.sin(s.angle) * moveSpeed;

        // Admin için sınır kalkanı (Duvara çarpmaz)
        if(s.x < 0 || s.x > WORLD_SIZE || s.y < 0 || s.y > WORLD_SIZE) {
            if(!s.isBot && isAdmin) { 
                s.x = Math.max(0, Math.min(WORLD_SIZE, s.x)); 
                s.y = Math.max(0, Math.min(WORLD_SIZE, s.y)); 
            } else { 
                s.alive = false; if(!s.isBot) document.getElementById("menu").style.display = "block"; 
            }
        }

        s.segments.unshift({x: s.x, y: s.y});
        if(s.segments.length > s.score + 15) s.segments.pop();

        for(let i = particles.length - 1; i >= 0; i--) {
            if(Math.hypot(s.x - particles[i].x, s.y - particles[i].y) < 28) {
                s.score += (isAdmin && !s.isBot) ? 2 : 1; // Adminler daha hızlı puan toplasın
                particles.splice(i, 1);
                if(particles.length < 300) particles.push(spawnParticle());
                if(!s.isBot) document.getElementById("scoreBox").innerText = "Puan: " + s.score;
            }
        }

        snakes.forEach(other => {
            if(!other.alive || s === other) return;
            other.segments.forEach((seg, si) => {
                if(si > 5 && Math.hypot(s.x - seg.x, s.y - seg.y) < 18) {
                    if(!s.isBot && isAdmin) { 
                        // Admin çarpınca diğerini yok eder (Kalkan Etkisi)
                        other.alive = false; 
                        s.score += 5; 
                    } else { 
                        s.alive = false; if(!s.isBot) document.getElementById("menu").style.display = "block"; 
                    }
                }
            });
        });
    });

    let top = snakes.filter(s => s.alive).sort((a,b) => b.score - a.score).slice(0, 5);
    let html = "<b>LİDERLER</b><br>";
    top.forEach((ts, i) => html += `<div class="row" style="color:${ts.color}">${i+1}. ${ts.name} <span>${ts.score}</span></div>`);
    document.getElementById("leaderRows").innerHTML = html;
}

function draw() {
    ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save(); ctx.translate(-camera.x, -camera.y);
    ctx.strokeStyle = "#151515"; ctx.lineWidth = 2;
    for(let x=0; x<=WORLD_SIZE; x+=200) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,WORLD_SIZE); ctx.stroke(); }
    for(let y=0; y<=WORLD_SIZE; y+=200) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(WORLD_SIZE,y); ctx.stroke(); }
    ctx.strokeStyle = "red"; ctx.lineWidth = 10; ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);
    
    particles.forEach(p => { ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
    
    snakes.forEach(s => {
        if(!s.alive) return;
        
        // Admin Kalkan Efekti (Işıma)
        if(!s.isBot && isAdmin) {
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#00ffff";
        }

        ctx.fillStyle = s.color;
        s.segments.forEach((seg, i) => { 
            ctx.beginPath(); 
            ctx.arc(seg.x, seg.y, i===0 ? 24 : 18, 0, Math.PI*2); 
            ctx.fill(); 
        });
        
        ctx.shadowBlur = 0; // Gölgeyi sıfırla
        ctx.fillStyle = "white"; ctx.font = "bold 15px Arial";
        ctx.fillText(s.name, s.x - 20, s.y - 40);
    });
    ctx.restore();
}

window.addEventListener('keydown', e => { if(e.key === "ArrowLeft") turnDir = -0.15; if(e.key === "ArrowRight") turnDir = 0.15; });
window.addEventListener('keyup', () => turnDir = 0);
document.getElementById("leftBtn").addEventListener('touchstart', (e) => { e.preventDefault(); turnDir = -0.15; });
document.getElementById("rightBtn").addEventListener('touchstart', (e) => { e.preventDefault(); turnDir = 0.15; });
document.getElementById("leftBtn").addEventListener('touchend', () => turnDir = 0);
document.getElementById("rightBtn").addEventListener('touchend', () => turnDir = 0);

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
