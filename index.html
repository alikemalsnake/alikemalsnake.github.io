<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ali Kemal [Admin] Snake.io</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: none; }
  #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
  canvas { background: #050505; position: absolute; border: 15px solid #222; }
  .screen { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; background: rgba(0,0,0,0.95); padding: 30px; border-radius: 20px; text-align: center; border: 4px solid #00ff00; min-width: 320px; display: none; }
  .active { display: block; }
  select, input { font-size: 18px; padding: 12px; border-radius: 10px; margin: 10px; width: 85%; background: #111; color: white; border: 2px solid #444; }
  button { font-size: 22px; padding: 15px 40px; border-radius: 12px; background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 15px; }
  
  /* LİDERLİK TABLOSU */
  #leaderboard { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; border: 2px solid #444; min-width: 200px; z-index: 50; pointer-events: none; }
  #leaderboard h3 { margin: 0 0 10px 0; color: #ffff00; font-size: 20px; text-align: center; text-transform: uppercase; border-bottom: 1px solid #444; padding-bottom: 5px; }
  .leader-row { display: flex; justify-content: space-between; font-size: 15px; margin-bottom: 5px; font-weight: bold; }
  
  #ui { position: fixed; top: 20px; left: 20px; z-index: 50; pointer-events: none; }
  #scoreBox { font-size: 35px; color: #00ff00; text-shadow: 0 0 10px #00ff00; font-weight: bold; }
</style>
</head>
<body>

<div id="ui"><div id="scoreBox">Puan: 0</div></div>
<div id="leaderboard"><h3>Liderler</h3><div id="leaderRows"></div></div>

<div id="menu" class="screen active">
  <h1 style="color:#00ff00; font-size: 40px; margin-bottom: 10px;">SNAKE.IO</h1>
  <p style="color: #ffd700; font-weight: bold;">ADMIN PANELİ AKTİF</p>
  <input type="text" id="nameInput" value="Ali Kemal" maxlength="12">
  <select id="difficulty"><option value="easy">KOLAY</option><option value="hard" selected>ZOR</option><option value="impossible">İMKANSIZ</option></select><br>
  <button onclick="startGame()">OYUNU BAŞLAT</button>
</div>

<div id="deathScreen" class="screen">
    <h1 style="color:#ff0000; font-size: 40px;">ÖLDÜN!</h1>
    <p id="finalScore" style="font-size: 24px; color: white;"></p>
    <button onclick="resetGame()">TEKRAR DENE</button>
</div>

<div id="viewport"><canvas id="gameCanvas"></canvas></div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const WORLD_SIZE = 4000;
canvas.width = WORLD_SIZE; canvas.height = WORLD_SIZE;

let snakes = [], particles = [], gameActive = false, isBoosting = false, turnDir = 0;
let diffSetting = { botSpeed: 4, botIntel: 0.05, botAggro: 0.1 };
const botNames = ["Kerem", "Efe", "Zeynep", "Mert", "Selin", "Arda", "Can", "Elif", "Burak", "Aslı", "Dragon", "Pro_X", "Efsane", "Alpha", "Shadow", "Thunder", "Storm", "Ghost", "Titan"];

function startGame() {
    const diff = document.getElementById("difficulty").value;
    if(diff === "easy") diffSetting = { botSpeed: 3.5, botIntel: 0.03, botAggro: 0.02 };
    if(diff === "hard") diffSetting = { botSpeed: 5, botIntel: 0.12, botAggro: 0.3 };
    if(diff === "impossible") diffSetting = { botSpeed: 7, botIntel: 0.35, botAggro: 0.7 };
    document.getElementById("menu").classList.remove("active");
    gameActive = true;
    init();
}

function resetGame() { document.getElementById("deathScreen").classList.remove("active"); document.getElementById("menu").classList.add("active"); }

function init() {
    snakes = []; particles = [];
    let rawName = document.getElementById("nameInput").value || "Ali Kemal";
    // SENİN İSMİNE ADMIN EKLEME
    snakes.push(createSnake(rawName + " [Admin]", "#00ff00", false, WORLD_SIZE/2, WORLD_SIZE/2));
    
    for(let i=0; i<25; i++) {
        snakes.push(createSnake(botNames[Math.floor(Math.random()*botNames.length)], `hsl(${Math.random()*360}, 85%, 55%)`, true, Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE));
    }
    for(let i=0; i<800; i++) spawnParticle();
    requestAnimationFrame(loop);
}

function createSnake(name, color, isBot, x, y) {
    return { name, color, isBot, alive: true, x, y, angle: Math.random()*Math.PI*2, actualScore: 0, speed: isBot ? diffSetting.botSpeed : 6, segments: [] };
}

function spawnParticle(x, y) {
    particles.push({ x: x ?? Math.random()*WORLD_SIZE, y: y ?? Math.random()*WORLD_SIZE, color: `hsl(${Math.random()*360},100%,60%)`, size: Math.random()*4+2 });
}

document.addEventListener("keydown", e => {
    if(e.key === "ArrowLeft" || e.key.toLowerCase() === "j") turnDir = -0.14;
    if(e.key === "ArrowRight" || e.key.toLowerCase() === "l") turnDir = 0.14;
    if(e.key === " ") isBoosting = true;
});
document.addEventListener("keyup", e => {
    if(e.key === "ArrowLeft" || e.key === "ArrowRight" || e.key.toLowerCase() === "j" || e.key.toLowerCase() === "l") turnDir = 0;
    if(e.key === " ") isBoosting = false;
});

function loop() {
    if(!gameActive) return;
    update();
    draw();
    updateLeaderboard();
    requestAnimationFrame(loop);
}

function updateLeaderboard() {
    const sorted = [...snakes].filter(s => s.alive).sort((a,b) => b.actualScore - a.actualScore).slice(0, 7);
    let html = "";
    sorted.forEach((s, i) => {
        // ADMIN İSMİ SARI RENKTE PARLAR
        const color = s.isBot ? "white" : "#ffff00"; 
        html += `<div class="leader-row" style="color:${color}"><span>${i+1}. ${s.name}</span><span>${s.actualScore}</span></div>`;
    });
    document.getElementById("leaderRows").innerHTML = html;
}

function update() {
    let player = snakes[0];
    snakes.forEach(s => {
        if(!s.alive) return;
        if(s.isBot) {
            let targetAngle;
            let distToPlayer = Math.hypot(s.x - player.x, s.y - player.y);
            if(distToPlayer < 500 && player.alive && Math.random() < diffSetting.botAggro) {
                targetAngle = Math.atan2(player.y - s.y, player.x - s.x);
            } else {
                let target = particles[0];
                targetAngle = Math.atan2(target.y - s.y, target.x - s.x);
            }
            let diff = targetAngle - s.angle;
            while(diff < -Math.PI) diff += Math.PI*2;
            while(diff > Math.PI) diff -= Math.PI*2;
            s.angle += diff * diffSetting.botIntel;
        } else { s.angle += turnDir; }

        let currentSpeed = (isBoosting && !s.isBot) ? s.speed*1.8 : s.speed;
        s.x += Math.cos(s.angle)*currentSpeed;
        s.y += Math.sin(s.angle)*currentSpeed;
        if(s.x<0 || s.x>WORLD_SIZE || s.y<0 || s.y>WORLD_SIZE) s.alive = false;

        s.segments.unshift({x: s.x, y: s.y});
        if(s.segments.length > (s.actualScore * 2) + 3) s.segments.pop();

        particles.forEach((p, i) => {
            if(Math.hypot(s.x-p.x, s.y-p.y) < 25) {
                particles.splice(i,1); s.actualScore += 1;
                if(!s.isBot) document.getElementById("scoreBox").innerText = "Puan: " + s.actualScore;
                spawnParticle();
            }
        });

        snakes.forEach(other => {
            if(!other.alive || s === other) return;
            if(Math.hypot(s.x - other.x, s.y - other.y) < 25) { s.alive = false; other.alive = false; }
            other.segments.slice(2).forEach(part => {
                if(Math.hypot(s.x - part.x, s.y - part.y) < 18) s.alive = false;
            });
        });

        if(!s.alive) {
            s.segments.forEach((p, i) => { if(i%2===0) spawnParticle(p.x, p.y); });
            if(!s.isBot) { gameActive = false; document.getElementById("finalScore").innerText = "Skorun: " + s.actualScore; document.getElementById("deathScreen").classList.add("active"); }
        }
    });
}

function draw() {
    ctx.fillStyle = "#050505"; ctx.fillRect(0,0,WORLD_SIZE,WORLD_SIZE);
    ctx.strokeStyle = "#1a1a1a";
    for(let i=0; i<WORLD_SIZE; i+=100) {
        ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,WORLD_SIZE); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(WORLD_SIZE,i); ctx.stroke();
    }
    particles.forEach(p => {
        ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    });
    snakes.forEach(s => {
        if(!s.alive) return;
        ctx.fillStyle = s.color;
        s.segments.forEach((p, i) => {
            ctx.beginPath(); ctx.arc(p.x, p.y, i===0?16:13, 0, Math.PI*2); ctx.fill();
            if(i===0) { 
                ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(p.x,p.y,5.5,0,Math.PI*2); ctx.fill(); 
                ctx.fillStyle="black"; ctx.beginPath(); ctx.arc(p.x,p.y,2.5,0,Math.PI*2); ctx.fill();
                ctx.fillStyle=s.color;
            }
        });
        // İSİM ETİKETLERİ
        ctx.fillStyle = s.isBot ? "white" : "#ffff00"; 
        ctx.font = s.isBot ? "bold 16px Arial" : "bold 18px Arial"; 
        ctx.fillText(s.name, s.x-30, s.y-30);
    });
    const myS = snakes[0];
    if(myS) {
        canvas.style.left = (window.innerWidth/2 - myS.x) + "px";
        canvas.style.top = (window.innerHeight/2 - myS.y) + "px";
    }
}
</script>
</body>
</html>
