<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ali Kemal Snake.io - Sunucu Sistemi</title>
<style>
  body { background: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none; }
  canvas { display: block; background: #080808; }
  #ui { position: fixed; top: 10px; left: 10px; z-index: 100; pointer-events: none; }
  #scoreBox { font-size: 25px; color: #00ff00; font-weight: bold; }
  #godTag { display: none; color: white; background: red; padding: 5px 15px; border-radius: 8px; margin-top: 5px; font-weight: bold; border: 2px solid white; font-size: 14px; }
  #leaderboard { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 10px; border: 2px solid #ffd700; border-radius: 10px; min-width: 170px; }
  .row { display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; margin-bottom: 3px; }
  #menu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 200; background: #1a1a1a; padding: 25px; border-radius: 20px; text-align: center; border: 4px solid #ffd700; width: 85%; max-width: 350px; }
  input { font-size: 18px; padding: 10px; border-radius: 8px; margin: 10px; text-align: center; width: 80%; background: #000; color: #fff; border: 1px solid #444; }
  select { font-size: 16px; padding: 8px; border-radius: 8px; width: 85%; background: #333; color: white; border: 2px solid #ffd700; }
  button#startBtn { font-size: 22px; padding: 12px 40px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 12px; font-weight: bold; margin-top: 15px; }
  #controls { position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: space-around; align-items: center; z-index: 150; padding: 0 20px; }
  .btn { width: 70px; height: 70px; background: rgba(255, 255, 255, 0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; user-select: none; border: 2px solid rgba(255,255,255,0.4); }
  #mobileG { width: 55px; height: 55px; background: rgba(255, 0, 0, 0.3); font-size: 20px; border-color: red; display: none; }
  #serverInfo { font-size: 12px; color: #ffd700; margin-top: 5px; }
</style>
</head>
<body>

<div id="ui">
    <div id="scoreBox">Puan: 0</div>
    <div id="godTag">🛡️ ÖLÜMSÜZ MOD AKTİF</div>
    <div id="serverInfo">Sunucu Durumu: Bağlanıyor...</div>
</div>

<div id="leaderboard">
    <h4 style="margin:0 0 5px 0; color:#ffd700; text-align:center;">SIRALAMA</h4>
    <div id="leaderRows"></div>
</div>

<div id="menu">
  <h1 style="color:#ffd700; margin:0 0 10px 0;">SNAKE.IO</h1>
  <p id="timerMsg" style="color:#aaa; font-size:12px;"></p>
  <input type="text" id="nameInput" placeholder="İsmin..." maxlength="15">
  <select id="difficulty">
    <option value="4.5">KOLAY</option>
    <option value="9.5" selected>ZOR (Stratejik)</option>
    <option value="13.5">🔥🔥 İMKANSIZ 🔥🔥</option>
  </select>
  <button id="startBtn" onclick="startGame()">BAŞLAT</button>
</div>

<div id="controls">
    <div class="btn" id="leftBtn">◀</div>
    <div class="btn" id="mobileG">G</div>
    <div class="btn" id="rightBtn">▶</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const WORLD_SIZE = 3500;

let snakes = [], particles = [], gameActive = false, turnDir = 0, godMode = false, isAdmin = false;
let camera = { x: 0, y: 0 };
let currentSpeed = 6.5;
let deathTime = null;
let currentBotPool = []; // Aktif sunucudaki botların isim listesi

const allPossibleNames = ["Kerem", "Efe", "Zeynep", "Mert", "Arda", "Can", "Elif", "Deniz", "Selim", "Melis", "Emre", "Burak", "Selin", "Kaan", "Umut", "Bora", "Demir", "Nil", "Poyraz", "Ada", "Ali", "Veli", "Ece", "Sarp", "Mira", "Ayaz", "Taylan", "Ceren", "Doruk", "Buse", "Kuzey", "Güney", "Toprak", "Yağmur"];

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = resize; resize();

function getRandomColor() { return `hsl(${Math.random() * 360}, 85%, 60%)`; }

// Yeni bir bot havuzu oluştur (Sunucu değiştiğinde çağrılır)
function refreshBotPool() {
    let pool = [];
    let shuffled = [...allPossibleNames].sort(() => 0.5 - Math.random());
    for(let i=0; i<30; i++) {
        pool.push({ name: shuffled[i % shuffled.length] + "_" + (Math.floor(Math.random()*90)+10), color: getRandomColor() });
    }
    return pool;
}

function createBotFromPool(index) {
    let data = currentBotPool[index % currentBotPool.length];
    return {
        name: data.name,
        color: data.color,
        x: Math.random()*(WORLD_SIZE-600)+300, 
        y: Math.random()*(WORLD_SIZE-600)+300,
        angle: Math.random()*Math.PI*2, 
        score: Math.floor(Math.random()*30)+20, 
        segments: [], alive: true, isBot: true,
        state: "explore",
        targetPos: { x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE },
        aiUpdateTimer: 0,
        bravery: Math.random()
    };
}

function startGame() {
    let now = Date.now();
    let rawName = document.getElementById("nameInput").value.trim();
    currentSpeed = parseFloat(document.getElementById("difficulty").value);

    // SUNUCU KONTROLÜ
    if (!deathTime || (now - deathTime) > 50000) {
        // 50 saniye geçti veya ilk oyun: Yeni sunucu/isimler
        currentBotPool = refreshBotPool();
        document.getElementById("serverInfo").innerText = "Sunucu: Yeni Dünya (#" + Math.floor(Math.random()*999) + ")";
    } else {
        // 50 saniye geçmedi: Aynı isimlerle devam
        document.getElementById("serverInfo").innerText = "Sunucu: Aynı Dünyaya Dönüldü";
    }

    if(rawName === "Ali Kemal") { 
        isAdmin = true; rawName = "Ali Kemal [Admin]"; 
        document.getElementById("mobileG").style.display = "flex";
    } else { 
        isAdmin = false; godMode = false;
        document.getElementById("godTag").style.display = "none";
        document.getElementById("mobileG").style.display = "none";
    }
    
    document.getElementById("menu").style.display = "none";
    init(rawName || "Oyuncu");
}

function init(pName) {
    snakes = []; particles = [];
    snakes.push({ name: pName, color: isAdmin ? "#00ff00" : getRandomColor(), x: WORLD_SIZE/2, y: WORLD_SIZE/2, angle: 0, score: 0, segments: [], alive: true, isBot: false });
    
    // Mevcut havuzdaki botları oluştur
    for(let i=0; i<currentBotPool.length; i++) {
        snakes.push(createBotFromPool(i));
    }
    
    for(let i=0; i<1100; i++) spawnParticle();
    gameActive = true; requestAnimationFrame(loop);
}

function spawnParticle() {
    particles.push({ x: Math.random()*(WORLD_SIZE-100)+50, y: Math.random()*(WORLD_SIZE-100)+50, color: getRandomColor(), size: 6 });
}

function toggleGodMode() {
    if(!isAdmin) return;
    godMode = !godMode;
    document.getElementById("godTag").style.display = godMode ? "block" : "none";
}

window.addEventListener('keydown', (e) => {
    let k = e.key.toLowerCase();
    if(k === "arrowleft") turnDir = -0.12;
    if(k === "arrowright") turnDir = 0.12;
    if(k === "g") toggleGodMode();
});
window.addEventListener('keyup', () => turnDir = 0);
document.getElementById("leftBtn").ontouchstart = (e) => { e.preventDefault(); turnDir = -0.12; };
document.getElementById("leftBtn").ontouchend = () => turnDir = 0;
document.getElementById("rightBtn").ontouchstart = (e) => { e.preventDefault(); turnDir = 0.12; };
document.getElementById("rightBtn").ontouchend = () => turnDir = 0;
document.getElementById("mobileG").ontouchstart = (e) => { e.preventDefault(); toggleGodMode(); };

function loop() { if(!gameActive) return; update(); draw(); requestAnimationFrame(loop); }

function update() {
    let player = snakes.find(s => !s.isBot && s.alive);

    for(let i = 0; i < snakes.length; i++) {
        let s = snakes[i];
        if(!s.alive) {
            if(s.isBot) { 
                let dropAmount = Math.min(s.segments.length, 45);
                for(let k = 0; k < dropAmount; k++) {
                    let seg = s.segments[k*2] || {x: s.x, y: s.y};
                    particles.push({ x: seg.x + (Math.random()-0.5)*60, y: seg.y + (Math.random()-0.5)*60, color: s.color, size: 7 });
                }
                snakes[i] = createBotFromPool(i); // Aynı havuzdan yeni bot
            }
            continue; 
        }
        
        if (s.isBot) {
            s.aiUpdateTimer--;
            if(s.aiUpdateTimer <= 0) {
                let viewDist = 500;
                let visibleParticles = particles.filter(p => Math.hypot(s.x-p.x, s.y-p.y) < viewDist);
                let visibleEnemies = snakes.filter(os => os !== s && os.alive && Math.hypot(s.x-os.x, s.y-os.y) < viewDist);

                let attackRisk = Math.random() < (s.bravery * 0.45); 

                if(visibleEnemies.length > 0 && (attackRisk || visibleEnemies[0].score < s.score)) {
                    let targetEnemy = visibleEnemies[0];
                    s.targetPos = { x: targetEnemy.x, y: targetEnemy.y };
                    s.state = "attack";
                } else if(visibleParticles.length > 0) {
                    let nearestP = visibleParticles[0];
                    s.targetPos = { x: nearestP.x, y: nearestP.y };
                    s.state = "eat";
                } else {
                    if(Math.hypot(s.x - s.targetPos.x, s.y - s.targetPos.y) < 150) {
                        s.targetPos = { x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE };
                    }
                    s.state = "explore";
                }
                s.aiUpdateTimer = 25 + Math.random() * 35;
            }

            let desiredAngle = Math.atan2(s.targetPos.y - s.y, s.targetPos.x - s.x);
            snakes.forEach(other => {
                if(!other.alive) return;
                other.segments.forEach((seg, idx) => {
                    if (idx % 12 === 0 && Math.hypot(s.x - seg.x, s.y - seg.y) < 55) {
                        desiredAngle += 0.9; 
                    }
                });
            });

            let diff = desiredAngle - s.angle;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            s.angle += diff * 0.14;
            if (s.x < 100 || s.x > WORLD_SIZE - 100 || s.y < 100 || s.y > WORLD_SIZE - 100) s.angle += 0.3;
        } else {
            s.angle += turnDir;
        }

        s.x += Math.cos(s.angle) * currentSpeed;
        s.y += Math.sin(s.angle) * currentSpeed;

        if(s.x < 0 || s.x > WORLD_SIZE || s.y < 0 || s.y > WORLD_SIZE) {
            if(!s.isBot && godMode) {
                if(s.x < 0) s.x = 0; if(s.x > WORLD_SIZE) s.x = WORLD_SIZE;
                if(s.y < 0) s.y = 0; if(s.y > WORLD_SIZE) s.y = WORLD_SIZE;
            } else {
                s.alive = false;
                if(!s.isBot) handlePlayerDeath();
            }
        }

        s.segments.unshift({x: s.x, y: s.y});
        if(s.segments.length > s.score + 15) s.segments.pop();

        for(let j = particles.length - 1; j >= 0; j--) {
            let p = particles[j];
            if(Math.hypot(s.x - p.x, s.y - p.y) < 30) {
                particles.splice(j, 1);
                s.score += 2;
                if(!s.isBot) document.getElementById("scoreBox").innerText = "Puan: " + s.score;
                if(particles.length < 1100) spawnParticle();
            }
        }

        snakes.forEach(other => {
            if(!other.alive || s === other) return;
            other.segments.forEach((p, idx) => {
                if(Math.hypot(s.x - p.x, s.y - p.y) < 18) {
                    if(!s.isBot && godMode) { other.alive = false; s.score += 60; } 
                    else {
                        s.alive = false;
                        if(!s.isBot) handlePlayerDeath();
                    }
                }
            });
        });
    }

    if(player) { camera.x = player.x - canvas.width/2; camera.y = player.y - canvas.height/2; }
    let sorted = [...snakes].filter(s => s.alive).sort((a,b) => b.score - a.score).slice(0, 7);
    let html = "";
    sorted.forEach((s, i) => { html += `<div class="row" style="color:${s.color}"><span>${i+1}. ${s.name}</span><span>${s.score}</span></div>`; });
    document.getElementById("leaderRows").innerHTML = html;
}

function handlePlayerDeath() {
    gameActive = false;
    deathTime = Date.now();
    document.getElementById("menu").style.display = "block";
    document.getElementById("timerMsg").innerText = "Aynı sunucuya dönmek için 50 saniyen var!";
}

function draw() {
    ctx.fillStyle = "#080808"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save(); ctx.translate(-camera.x, -camera.y);
    ctx.strokeStyle = "#300"; ctx.lineWidth = 15; ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);
    particles.forEach(p => { ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2); ctx.fill(); });
    snakes.forEach(s => {
        if(!s.alive) return;
        ctx.fillStyle = s.color;
        if(!s.isBot && godMode) { ctx.shadowBlur = 20; ctx.shadowColor = "white"; }
        s.segments.forEach((seg, i) => { ctx.beginPath(); ctx.arc(seg.x, seg.y, i === 0 ? 18 : 14, 0, Math.PI*2); ctx.fill(); });
        ctx.shadowBlur = 0; ctx.fillStyle = "white"; ctx.font = "bold 14px Arial"; ctx.fillText(s.name, s.x - 25, s.y - 25);
    });
    ctx.restore();
}
</script>
</body>
</html>
