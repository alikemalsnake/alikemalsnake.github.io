<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ali Kemal Admin Snake.io</title>
<style>
  body { background: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
  #viewport { width: 100vw; height: 100vh; position: relative; }
  canvas { background: #050505; position: absolute; border: 5px solid #333; }

  /* SKOR TABLOSU - SAĞ ÜSTTE SABİT */
  #leaderboard { 
    position: fixed; top: 20px; right: 20px; 
    background: rgba(0,0,0,0.9); padding: 15px; 
    border: 3px solid #ffd700; border-radius: 15px; 
    min-width: 220px; z-index: 9999;
  }
  #leaderboard h3 { margin: 0 0 10px 0; color: #ffd700; text-align: center; }
  .row { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; }

  /* SOL ÜST BİLGİ */
  #ui { position: fixed; top: 20px; left: 20px; z-index: 9999; }
  #scoreBox { font-size: 35px; color: #00ff00; font-weight: bold; }
  #godTag { 
    display: none; color: #ff0000; font-size: 25px; font-weight: bold; 
    background: white; padding: 5px 10px; border-radius: 5px; margin-top: 10px;
  }

  .screen { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10000; background: #111; padding: 40px; border-radius: 20px; text-align: center; border: 5px solid #ffd700; }
  button { font-size: 25px; padding: 15px 50px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 10px; }
</style>
</head>
<body>

<div id="ui">
    <div id="scoreBox">Puan: 0</div>
    <div id="godTag">ÖLÜMSÜZ MOD AKTİF 🛡️</div>
</div>

<div id="leaderboard">
    <h3>🏆 LİDERLER</h3>
    <div id="leaderRows"></div>
</div>

<div id="menu" class="screen">
  <h1 style="color:#ffd700; font-size: 50px;">SNAKE.IO</h1>
  <h2 style="color:#00ff00;">HOŞ GELDİN ALİ KEMAL [ADMIN]</h2>
  <button onclick="startGame()">BAŞLAT</button>
  <p style="color: #aaa; margin-top: 20px;">
    Yönler: <b>Ok Tuşları</b> | Ölümsüzlük: <b>G Tuşu</b>
  </p>
</div>

<div id="viewport"><canvas id="gameCanvas"></canvas></div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const WORLD_SIZE = 3000;
canvas.width = WORLD_SIZE; canvas.height = WORLD_SIZE;

let snakes = [], particles = [], gameActive = false, turnDir = 0, godMode = false;

function startGame() {
    document.getElementById("menu").style.display = "none";
    gameActive = true;
    init();
}

function init() {
    snakes = []; particles = [];
    // Senin yılanın
    snakes.push({ name: "Ali Kemal [Admin]", color: "#00ff00", isBot: false, alive: true, x: 1500, y: 1500, angle: 0, score: 0, segments: [] });
    
    // Botlar
    for(let i=0; i<15; i++) {
        snakes.push({ name: "Bot_"+i, color: "blue", isBot: true, alive: true, x: Math.random()*3000, y: Math.random()*3000, angle: Math.random()*7, score: 0, segments: [] });
    }
    for(let i=0; i<500; i++) spawnParticle();
    requestAnimationFrame(loop);
}

function spawnParticle() {
    particles.push({ x: Math.random()*3000, y: Math.random()*3000, color: "yellow" });
}

// TUŞLARIN KESİN ÇALIŞMASI İÇİN YENİ SİSTEM
window.onkeydown = function(e) {
    let key = e.key.toLowerCase();
    if(key === "arrowleft") turnDir = -0.1;
    if(key === "arrowright") turnDir = 0.1;
    
    // G TUŞU KONTROLÜ
    if(key === "g") {
        godMode = !godMode;
        document.getElementById("godTag").style.display = godMode ? "block" : "none";
        console.log("Ölümsüzlük:", godMode);
    }
};
window.onkeyup = function() { turnDir = 0; };

function loop() {
    if(!gameActive) return;
    update();
    draw();
    updateBoard();
    requestAnimationFrame(loop);
}

function updateBoard() {
    let sorted = [...snakes].sort((a,b) => b.score - a.score).slice(0, 5);
    let html = "";
    sorted.forEach((s, i) => {
        let c = s.name.includes("Admin") ? "#ffd700" : "white";
        html += `<div class="row" style="color:${c}"><span>${i+1}. ${s.name}</span><span>${s.score}</span></div>`;
    });
    document.getElementById("leaderRows").innerHTML = html;
}

function update() {
    snakes.forEach(s => {
        if(!s.alive) return;
        if(s.isBot) {
            s.angle += (Math.random() - 0.5) * 0.2;
        } else {
            s.angle += turnDir;
        }
        
        s.x += Math.cos(s.angle) * 5;
        s.y += Math.sin(s.angle) * 5;

        // Kenarlardan Geçiş (Ölümsüzlük)
        if(s.x < 0) s.x = 3000; if(s.x > 3000) s.x = 0;
        if(s.y < 0) s.y = 3000; if(s.y > 3000) s.y = 0;

        s.segments.unshift({x: s.x, y: s.y});
        if(s.segments.length > s.score + 5) s.segments.pop();

        // Yem yeme
        particles.forEach((p, i) => {
            if(Math.hypot(s.x-p.x, s.y-p.y) < 20) {
                particles.splice(i, 1);
                s.score++;
                if(!s.isBot) document.getElementById("scoreBox").innerText = "Puan: " + s.score;
                spawnParticle();
            }
        });

        // Çarpışma (Admin ölümsüzlüğü burada devreye girer)
        snakes.forEach(other => {
            if(s === other || !other.alive) return;
            other.segments.forEach(p => {
                if(Math.hypot(s.x - p.x, s.y - p.y) < 10) {
                    if(s.isBot || !godMode) {
                        s.alive = false;
                        if(!s.isBot) location.reload(); // Ölünce yenile
                    }
                }
            });
        });
    });
}

function draw() {
    ctx.clearRect(0, 0, 3000, 3000);
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, 7); ctx.fill();
    });
    snakes.forEach(s => {
        if(!s.alive) return;
        ctx.fillStyle = s.color;
        s.segments.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, 12, 0, 7); ctx.fill();
        });
        ctx.fillStyle = s.name.includes("Admin") ? "#ffd700" : "white";
        ctx.fillText(s.name, s.x - 20, s.y - 20);
    });

    // Kamera Takibi
    let me = snakes[0];
    canvas.style.left = (window.innerWidth/2 - me.x) + "px";
    canvas.style.top = (window.innerHeight/2 - me.y) + "px";
}
</script>
</body>
</html>
