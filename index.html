<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ali Kemal Snake.io - Renkli Dünya</title>
<style>
  body { background: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
  canvas { background: #050505; display: block; }
  #ui { position: fixed; top: 20px; left: 20px; z-index: 100; pointer-events: none; }
  #scoreBox { font-size: 32px; color: #00ff00; font-weight: bold; text-shadow: 0 0 10px #000; }
  #godTag { display: none; color: white; background: red; padding: 8px 15px; border-radius: 8px; margin-top: 10px; font-weight: bold; border: 2px solid white; box-shadow: 0 0 15px red; }
  #leaderboard { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #ffd700; border-radius: 12px; min-width: 180px; }
  .row { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; }
  #menu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 200; background: #111; padding: 40px; border-radius: 25px; text-align: center; border: 5px solid #ffd700; min-width: 300px; }
  input { font-size: 20px; padding: 12px; border-radius: 10px; margin: 15px; text-align: center; width: 80%; background: #000; color: white; border: 2px solid #444; }
  button { font-size: 22px; padding: 15px 40px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 12px; font-weight: bold; }
</style>
</head>
<body>

<div id="ui">
    <div id="scoreBox">Puan: 0</div>
    <div id="godTag">🛡️ ÖLÜMSÜZ MOD AKTİF</div>
</div>

<div id="leaderboard">
    <div id="leaderRows"></div>
</div>

<div id="menu">
  <h1 style="color:#ffd700; margin-top:0;">SNAKE.IO</h1>
  <p style="color:#888;">İsmini yaz ve oyuna başla:</p>
  <input type="text" id="nameInput" value="" maxlength="15">
  <br>
  <button onclick="startGame()">BAŞLAT</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const WORLD_SIZE = 3000;

let snakes = [], particles = [], gameActive = false, turnDir = 0, godMode = false, isAdmin = false;
let camera = { x: 0, y: 0 };

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

// Rastgele Renk Oluşturucu
function getRandomColor() {
    return `hsl(${Math.random() * 360}, 100%, 50%)`;
}

function startGame() {
    let name = document.getElementById("nameInput").value.trim();
    if(name === "Ali Kemal") {
        isAdmin = true;
        name = "Ali Kemal [Admin]";
    } else {
        isAdmin = false;
    }
    
    godMode = false; // Başlangıçta ölümsüzlük hep kapalı
    document.getElementById("godTag").style.display = "none";
    document.getElementById("menu").style.display = "none";
    gameActive = true;
    init(name || "Oyuncu");
}

function init(pName) {
    snakes = []; particles = [];
    // Senin yılanın
    snakes.push({
        name: pName, color: isAdmin ? "#00ff00" : getRandomColor(),
        x: WORLD_SIZE/2, y: WORLD_SIZE/2, angle: 0, score: 0, segments: [], alive: true, isBot: false
    });

    // Renkli Botlar
    for(let i=0; i<18; i++) {
        snakes.push({
            name: "Bot_"+i, color: getRandomColor(), 
            x: Math.random()*(WORLD_SIZE-200)+100, y: Math.random()*(WORLD_SIZE-200)+100,
            angle: Math.random()*Math.PI*2, score: 5, segments: [], alive: true, isBot: true
        });
    }

    // Gökkuşağı Yemler
    for(let i=0; i<400; i++) spawnParticle();
    requestAnimationFrame(loop);
}

function spawnParticle() {
    particles.push({
        x: Math.random()*(WORLD_SIZE-60)+30, 
        y: Math.random()*(WORLD_SIZE-60)+30, 
        color: getRandomColor() 
    });
}

window.onkeydown = (e) => {
    let k = e.key.toLowerCase();
    if(k === "arrowleft" || k === "a") turnDir = -0.09;
    if(k === "arrowright" || k === "d") turnDir = 0.09;
    
    // G Tuşu Kontrolü
    if(k === "g" && isAdmin) {
        godMode = !godMode;
        document.getElementById("godTag").style.display = godMode ? "block" : "none";
    }
};
window.onkeyup = () => turnDir = 0;

function loop() {
    if(!gameActive) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    snakes.forEach(s => {
        if(!s.alive) return;
        s.angle += s.isBot ? (Math.random()-0.5)*0.25 : turnDir;
        s.x += Math.cos(s.angle) * 5.8;
        s.y += Math.sin(s.angle) * 5.8;

        // Duvar Kontrolü
        if(s.x < 0 || s.x > WORLD_SIZE || s.y < 0 || s.y > WORLD_SIZE) {
            if(s.isBot || !godMode) {
                s.alive = false;
                if(!s.isBot) setTimeout(() => location.reload(), 1000);
            } else {
                if(s.x < 0) s.x = 0; if(s.x > WORLD_SIZE) s.x = WORLD_SIZE;
                if(s.y < 0) s.y = 0; if(s.y > WORLD_SIZE) s.y = WORLD_SIZE;
            }
        }

        s.segments.unshift({x: s.x, y: s.y});
        if(s.segments.length > s.score + 10) s.segments.pop();

        // Yem Yeme
        particles.forEach((p, i) => {
            if(Math.hypot(s.x-p.x, s.y-p.y) < 22) {
                particles.splice(i, 1);
                s.score++;
                if(!s.isBot) document.getElementById("scoreBox").innerText = "Puan: " + s.score;
                spawnParticle();
            }
        });

        // Çarpışma
        snakes.forEach(other => {
            if(s === other || !other.alive) return;
            other.segments.forEach((p, idx) => {
                if(idx > 3 && Math.hypot(s.x - p.x, s.y - p.y) < 13) {
                    if(s.isBot || !godMode) {
                        s.alive = false;
                        if(!s.isBot) setTimeout(() => location.reload(), 1000);
                    }
                }
            });
        });
    });

    let me = snakes[0];
    camera.x = me.x - canvas.width/2;
    camera.y = me.y - canvas.height/2;

    let sorted = [...snakes].sort((a,b) => b.score - a.score).slice(0, 5);
    let html = "";
    sorted.forEach((s, i) => {
        html += `<div class="row" style="color:${s.name.includes('Admin')?'#ffd700':'white'}"><span>${i+1}. ${s.name}</span><span>${s.score}</span></div>`;
    });
    document.getElementById("leaderRows").innerHTML = html;
}

function draw() {
    ctx.fillStyle = "#050505";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // Kırmızı Sınırlar
    ctx.strokeStyle = "red";
    ctx.lineWidth = 15;
    ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);
    ctx.lineWidth = 1;

    // Renkli Yemler
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 5; ctx.shadowColor = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, 7); ctx.fill();
    });
    ctx.shadowBlur = 0;

    // Renkli Yılanlar
    snakes.forEach(s => {
        if(!s.alive) return;
        ctx.fillStyle = s.color;
        
        if(!s.isBot && godMode) {
            ctx.shadowBlur = 20;
            ctx.shadowColor = "white";
        }

        s.segments.forEach((seg, i) => {
            ctx.beginPath();
            ctx.arc(seg.x, seg.y, i === 0 ? 16 : 13, 0, 7);
            ctx.fill();
        });
        ctx.shadowBlur = 0;
        ctx.fillStyle = "white";
        ctx.font = "bold 14px Arial";
        ctx.fillText(s.name, s.x - 25, s.y - 25);
    });
    ctx.restore();
}
</script>
</body>
</html>
