<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ali Kemal Snake</title>
<style>
  body { background: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
  canvas { background: #050505; display: block; }
  #ui { position: fixed; top: 20px; left: 20px; z-index: 100; pointer-events: none; }
  #scoreBox { font-size: 30px; color: #00ff00; font-weight: bold; }
  #godTag { display: none; color: #fff; background: #ff0000; padding: 10px; border-radius: 8px; margin-top: 10px; font-weight: bold; border: 2px solid white; }
  #leaderboard { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #ffd700; border-radius: 10px; min-width: 180px; }
  .row { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; }
  #menu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 200; background: #111; padding: 30px; border-radius: 20px; text-align: center; border: 4px solid #ffd700; }
  button { font-size: 20px; padding: 10px 30px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; }
  input { font-size: 18px; padding: 10px; border-radius: 8px; margin: 10px; text-align: center; }
</style>
</head>
<body>

<div id="ui">
    <div id="scoreBox">Puan: 0</div>
    <div id="godTag">🛡️ ÖLÜMSÜZ MOD AKTİF</div>
</div>

<div id="leaderboard">
    <h3 style="margin:0 0 10px 0; color:#ffd700; text-align:center;">SKORLAR</h3>
    <div id="leaderRows"></div>
</div>

<div id="menu">
  <h1 style="color:#ffd700;">SNAKE.IO</h1>
  <input type="text" id="nameInput" placeholder="İsmini Yaz..." maxlength="15">
  <br>
  <button onclick="startGame()">OYUNU BAŞLAT</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const WORLD_SIZE = 3000;

let snakes = [], particles = [], gameActive = false, turnDir = 0, godMode = false, isAdmin = false;
let camera = { x: 0, y: 0 };

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

function startGame() {
    let inputName = document.getElementById("nameInput").value.trim();
    if(inputName === "Ali Kemal") {
        isAdmin = true;
        inputName = "Ali Kemal [Admin]";
    }
    document.getElementById("menu").style.display = "none";
    gameActive = true;
    init(inputName || "Oyuncu");
}

function init(pName) {
    snakes = []; particles = [];
    snakes.push({
        name: pName, color: isAdmin ? "#00ff00" : "#00aaff",
        x: WORLD_SIZE/2, y: WORLD_SIZE/2, angle: 0, score: 0, segments: [], alive: true
    });
    for(let i=0; i<15; i++) {
        snakes.push({
            name: "Bot_"+i, color: "red", x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE,
            angle: Math.random()*6, score: 5, segments: [], alive: true, isBot: true
        });
    }
    for(let i=0; i<500; i++) particles.push({x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE});
    requestAnimationFrame(loop);
}

window.onkeydown = (e) => {
    let k = e.key.toLowerCase();
    if(k === "arrowleft") turnDir = -0.09;
    if(k === "arrowright") turnDir = 0.09;
    if(k === "g" && isAdmin) {
        godMode = !godMode;
        document.getElementById("godTag").style.display = godMode ? "block" : "none";
    }
};
window.onkeyup = () => turnDir = 0;

function loop() {
    if(!gameActive) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    snakes.forEach(s => {
        if(!s.alive) return;
        s.angle += s.isBot ? (Math.random()-0.5)*0.2 : turnDir;
        s.x += Math.cos(s.angle) * 5;
        s.y += Math.sin(s.angle) * 5;

        if(s.x < 0) s.x = WORLD_SIZE; if(s.x > WORLD_SIZE) s.x = 0;
        if(s.y < 0) s.y = WORLD_SIZE; if(s.y > WORLD_SIZE) s.y = 0;

        s.segments.unshift({x: s.x, y: s.y});
        if(s.segments.length > s.score + 10) s.segments.pop();

        particles.forEach((p, i) => {
            if(Math.hypot(s.x-p.x, s.y-p.y) < 20) {
                particles.splice(i, 1);
                s.score++;
                if(!s.isBot) document.getElementById("scoreBox").innerText = "Puan: " + s.score;
                particles.push({x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE});
            }
        });

        snakes.forEach(other => {
            if(s === other || !other.alive) return;
            other.segments.forEach((p, idx) => {
                if(idx > 3 && Math.hypot(s.x - p.x, s.y - p.y) < 12) {
                    if(s.isBot || !godMode) {
                        s.alive = false;
                        if(!s.isBot) location.reload();
                    }
                }
            });
        });
    });

    let me = snakes[0];
    camera.x = me.x - canvas.width/2;
    camera.y = me.y - canvas.height/2;

    let sorted = [...snakes].sort((a,b) => b.score - a.score).slice(0, 5);
    let html = "";
    sorted.forEach((s, i) => {
        html += `<div class="row" style="color:${s.name.includes('Admin')?'#ffd700':'white'}"><span>${i+1}. ${s.name}</span><span>${s.score}</span></div>`;
    });
    document.getElementById("leaderRows").innerHTML = html;
}

function draw() {
    ctx.fillStyle = "#050505";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    particles.forEach(p => {
        ctx.fillStyle = "yellow";
        ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, 7); ctx.fill();
    });

    snakes.forEach(s => {
        if(!s.alive) return;
        ctx.fillStyle = s.color;
        if(!s.isBot && godMode) { ctx.shadowBlur = 15; ctx.shadowColor = "red"; }
        s.segments.forEach((seg, i) => {
            ctx.beginPath(); ctx.arc(seg.x, seg.y, i === 0 ? 15 : 12, 0, 7); ctx.fill();
        });
        ctx.shadowBlur = 0;
        ctx.fillStyle = "white";
        ctx.fillText(s.name, s.x - 20, s.y - 20);
    });
    ctx.restore();
}
</script>
</body>
</html>
