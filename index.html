<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ali Kemal Snake.io - Pro Edition</title>
<style>
  body { background: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none; }
  canvas { display: block; background: #080808; }
  #ui { position: fixed; top: 10px; left: 10px; z-index: 100; pointer-events: none; }
  #scoreBox { font-size: 25px; color: #00ff00; font-weight: bold; text-shadow: 2px 2px #000; }
  #godTag { display: none; color: white; background: red; padding: 5px 15px; border-radius: 8px; margin-top: 5px; font-weight: bold; border: 2px solid white; font-size: 14px; }
  #leaderboard { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.85); padding: 12px; border: 2px solid #ffd700; border-radius: 12px; min-width: 180px; }
  .row { display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; margin-bottom: 4px; }
  #menu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 200; background: rgba(20, 20, 20, 0.95); padding: 30px; border-radius: 25px; text-align: center; border: 5px solid #ffd700; width: 85%; max-width: 380px; box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); }
  input { font-size: 18px; padding: 12px; border-radius: 10px; margin: 10px; text-align: center; width: 85%; background: #000; color: #fff; border: 2px solid #444; }
  button#startBtn { font-size: 24px; padding: 15px 50px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 15px; font-weight: bold; margin-top: 20px; transition: 0.2s; }
  #controls { position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: space-around; align-items: center; z-index: 150; padding: 0 20px; }
  .btn { width: 75px; height: 75px; background: rgba(255, 255, 255, 0.15); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; user-select: none; border: 2px solid rgba(255,255,255,0.3); }
  #mobileG { width: 60px; height: 60px; background: rgba(255, 0, 0, 0.2); font-size: 20px; border-color: red; display: none; }
</style>
</head>
<body>

<div id="ui">
    <div id="scoreBox">Puan: 0</div>
    <div id="godTag">🛡️ ÖLÜMSÜZ MOD</div>
</div>

<div id="leaderboard">
    <h4 style="margin:0 0 8px 0; color:#ffd700; text-align:center;">SKOR TABLOSU</h4>
    <div id="leaderRows"></div>
</div>

<div id="menu">
  <h1 style="color:#ffd700; margin:0 0 10px 0;">SNAKE.IO</h1>
  <p id="timerMsg" style="color:#00ff00; font-size:13px;">Sunucu Aktif - Bağlanabilirsin</p>
  <input type="text" id="nameInput" placeholder="İsmin..." maxlength="15">
  <button id="startBtn" onclick="startGame()">BAŞLAT</button>
</div>

<div id="controls">
    <div class="btn" id="leftBtn">◀</div>
    <div class="btn" id="mobileG">G</div>
    <div class="btn" id="rightBtn">▶</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const WORLD_SIZE = 3800;

let snakes = [], particles = [], turnDir = 0, godMode = false, isAdmin = false;
let camera = { x: 0, y: 0 };
let currentSpeed = 9;
let deathTime = null;
let currentBotPool = [];

const botNames = ["Kerem", "Efe", "Zeynep", "Mert", "Arda", "Can", "Elif", "Deniz", "Selim", "Melis", "Emre", "Burak", "Selin", "Kaan", "Umut", "Bora", "Demir", "Nil", "Poyraz", "Ada"];

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = resize; resize();

function getRandomColor() { return `hsl(${Math.random() * 360}, 80%, 60%)`; }

function createBotPool() {
    let pool = [];
    for(let i=0; i<30; i++) {
        pool.push({ name: botNames[i % botNames.length] + "_" + (Math.floor(Math.random()*90)+10), color: getRandomColor() });
    }
    return pool;
}

function spawnBot(index) {
    let data = currentBotPool[index % currentBotPool.length];
    return {
        name: data.name, color: data.color,
        x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE,
        angle: Math.random()*Math.PI*2, score: Math.floor(Math.random()*40)+20,
        segments: [], alive: true, isBot: true, aiTimer: 0,
        targetPos: {x: 0, y: 0}, state: "eat"
    };
}

// Dünyayı kur
currentBotPool = createBotPool();
for(let i=0; i<currentBotPool.length; i++) snakes.push(spawnBot(i));
for(let i=0; i<1200; i++) particles.push({ x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE, color: getRandomColor() });

function startGame() {
    let now = Date.now();
    let name = document.getElementById("nameInput").value.trim();

    if (deathTime && (now - deathTime) > 50000) {
        currentBotPool = createBotPool();
        snakes = snakes.filter(s => !s.isBot);
        for(let i=0; i<currentBotPool.length; i++) snakes.push(spawnBot(i));
    }

    if(name === "Ali Kemal") { 
        isAdmin = true; name = "Ali Kemal [Admin]"; 
        document.getElementById("mobileG").style.display = "flex";
    }

    snakes = snakes.filter(s => s.isBot);
    snakes.push({
        name: name || "Oyuncu", color: isAdmin ? "#00ff00" : getRandomColor(),
        x: WORLD_SIZE/2, y: WORLD_SIZE/2, angle: 0, score: 0, segments: [], alive: true, isBot: false
    });

    document.getElementById("menu").style.display = "none";
}

function update() {
    let player = snakes.find(s => !s.isBot && s.alive);
    let aliveSnakes = snakes.filter(s => s.alive);

    // Kamera Takibi
    if (player) {
        camera.x = player.x - canvas.width/2;
        camera.y = player.y - canvas.height/2;
    } else {
        let leader = aliveSnakes.sort((a,b) => b.score - a.score)[0];
        if (leader) {
            camera.x += (leader.x - canvas.width/2 - camera.x) * 0.05;
            camera.y += (leader.y - canvas.height/2 - camera.y) * 0.05;
        }
    }

    snakes.forEach(s => {
        if (!s.alive) {
            if (s.isBot) {
                let idx = snakes.indexOf(s);
                snakes[idx] = spawnBot(idx);
            }
            return;
        }

        if (s.isBot) {
            s.aiTimer--;
            if (s.aiTimer <= 0) {
                let distToPlayer = player ? Math.hypot(s.x - player.x, s.y - player.y) : 9999;
                
                // --- STRATEJİK ZEKA ---
                if (player && distToPlayer < 700) {
                    if (player.score < 100) { 
                        // Sen küçükken daha agresif saldırırlar
                        s.state = (Math.random() < 0.6) ? "attack" : "circle";
                    } else if (player.score > 400) {
                        // Sen büyükken korkarlar, NADİREN (0.05 ihtimal) saldırırlar
                        s.state = (Math.random() < 0.05) ? "attack" : "circle";
                    } else {
                        s.state = "circle";
                    }
                } else {
                    s.state = "eat";
                }

                if (s.state === "attack" && player) {
                    s.targetPos = { x: player.x, y: player.y };
                } else if (s.state === "circle" && player) {
                    // Etrafında dolanma mantığı
                    s.targetPos = { 
                        x: player.x + Math.cos(Date.now()/1000) * 300, 
                        y: player.y + Math.sin(Date.now()/1000) * 300 
                    };
                } else {
                    let p = particles[Math.floor(Math.random()*particles.length)];
                    s.targetPos = { x: p.x, y: p.y };
                }
                s.aiTimer = 30 + Math.random()*30;
            }

            let desiredAngle = Math.atan2(s.targetPos.y - s.y, s.targetPos.x - s.x);
            
            // Çarpışma Önleyici
            snakes.forEach(other => {
                if (other.alive && s !== other && Math.hypot(s.x - other.x, s.y - other.y) < 100) {
                    desiredAngle += 0.8;
                }
            });

            let diff = desiredAngle - s.angle;
            while(diff < -Math.PI) diff += Math.PI*2;
            while(diff > Math.PI) diff -= Math.PI*2;
            s.angle += diff * 0.1;
        } else {
            s.angle += turnDir;
        }

        s.x += Math.cos(s.angle) * currentSpeed;
        s.y += Math.sin(s.angle) * currentSpeed;

        // Dünya Sınırı
        if (s.x < 0 || s.x > WORLD_SIZE || s.y < 0 || s.y > WORLD_SIZE) {
            if (!s.isBot && godMode) {
                s.x = Math.max(0, Math.min(WORLD_SIZE, s.x));
                s.y = Math.max(0, Math.min(WORLD_SIZE, s.y));
            } else {
                s.alive = false;
                if (!s.isBot) { deathTime = Date.now(); document.getElementById("menu").style.display = "block"; }
            }
        }

        s.segments.unshift({x: s.x, y: s.y});
        if (s.segments.length > s.score + 15) s.segments.pop();

        // Yemek
        particles.forEach((p, pi) => {
            if (Math.hypot(s.x - p.x, s.y - p.y) < 30) {
                s.score += 2;
                particles[pi] = { x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE, color: getRandomColor() };
                if (!s.isBot) document.getElementById("scoreBox").innerText = "Puan: " + s.score;
            }
        });

        // Çarpışma Ölümü
        snakes.forEach(other => {
            if (!other.alive || s === other) return;
            other.segments.forEach((seg, si) => {
                if (si > 3 && Math.hypot(s.x - seg.x, s.y - seg.y) < 18) {
                    if (!s.isBot && godMode) { other.alive = false; s.score += 50; }
                    else {
                        s.alive = false;
                        if (!s.isBot) { deathTime = Date.now(); document.getElementById("menu").style.display = "block"; }
                    }
                }
            });
        });
    });

    let top = aliveSnakes.sort((a,b) => b.score - a.score).slice(0, 7);
    let html = "";
    top.forEach((ts, i) => {
        html += `<div class="row" style="color:${ts.color}"><span>${i+1}. ${ts.name}</span><span>${ts.score}</span></div>`;
    });
    document.getElementById("leaderRows").innerHTML = html;
}

function draw() {
    ctx.fillStyle = "#080808"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save(); ctx.translate(-camera.x, -camera.y);
    
    // Grid
    ctx.strokeStyle = "#151515"; ctx.lineWidth = 2;
    for(let i=0; i<=WORLD_SIZE; i+=250) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, WORLD_SIZE); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(WORLD_SIZE, i); ctx.stroke();
    }

    particles.forEach(p => {
        ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2); ctx.fill();
    });

    snakes.forEach(s => {
        if (!s.alive) return;
        ctx.fillStyle = s.color;
        s.segments.forEach((seg, si) => {
            ctx.beginPath(); ctx.arc(seg.x, seg.y, si === 0 ? 19 : 15, 0, Math.PI*2); ctx.fill();
        });
        ctx.fillStyle = "white"; ctx.font = "bold 15px Arial";
        ctx.fillText(s.name, s.x - 30, s.y - 30);
    });
    ctx.restore();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

window.addEventListener('keydown', e => {
    if (e.key === "ArrowLeft") turnDir = -0.12;
    if (e.key === "ArrowRight") turnDir = 0.12;
    if (e.key.toLowerCase() === "g" && isAdmin) {
        godMode = !godMode;
        document.getElementById("godTag").style.display = godMode ? "block" : "none";
    }
});
window.addEventListener('keyup', () => turnDir = 0);
document.getElementById("leftBtn").ontouchstart = () => turnDir = -0.12;
document.getElementById("rightBtn").ontouchstart = () => turnDir = 0.12;
document.getElementById("leftBtn").ontouchend = document.getElementById("rightBtn").ontouchend = () => turnDir = 0;

loop();
</script>
</body>
</html>
