<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ali Kemal Snake.io - Pro</title>
<style>
  body { background: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none; }
  canvas { display: block; background: #050505; }
  #ui { position: fixed; top: 10px; left: 10px; z-index: 100; pointer-events: none; }
  #scoreBox { font-size: 24px; color: #00ff00; font-weight: bold; text-shadow: 2px 2px #000; }
  #superToggle { display: none; pointer-events: auto; background: #440000; color: white; padding: 12px 18px; border-radius: 10px; margin-top: 10px; font-weight: bold; border: 2px solid #ff0000; cursor: pointer; }
  #leaderboard { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #ffd700; border-radius: 10px; min-width: 140px; }
  .row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 2px; }
  #menu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 200; background: rgba(10, 10, 10, 0.98); padding: 25px; border-radius: 20px; text-align: center; border: 3px solid #ffd700; width: 80%; max-width: 320px; }
  input { font-size: 16px; padding: 10px; border-radius: 8px; margin-bottom: 12px; text-align: center; width: 85%; background: #111; color: #fff; border: 1px solid #333; }
  .diff-box { display: flex; flex-direction: column; gap: 8px; }
  .diff-btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; }
  .easy { background: #28a745; } .medium { background: #ffc107; color: black; } .hard { background: #dc3545; }
  #controls { position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: space-around; z-index: 150; }
  .btn { width: 70px; height: 70px; background: rgba(255, 255, 255, 0.05); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 25px; border: 1px solid rgba(255,255,255,0.1); user-select: none; }
</style>
</head>
<body>

<div id="ui">
    <div id="scoreBox">Puan: 0</div>
    <div id="superToggle" onclick="toggleSuperMode()">🚀 SÜPER MOD (G)</div>
</div>

<div id="leaderboard"><div id="leaderRows"></div></div>

<div id="menu">
  <h2 style="color:#ffd700; margin: 0 0 15px 0;">SNAKE.IO PRO</h2>
  <input type="text" id="nameInput" placeholder="İSİM GİR" maxlength="12">
  <div class="diff-box">
    <button class="diff-btn easy" onclick="startGame('easy')">KOLAY</button>
    <button class="diff-btn medium" onclick="startGame('medium')">ORTA</button>
    <button class="diff-btn hard" onclick="startGame('hard')">ZOR</button>
  </div>
</div>

<div id="controls"><div class="btn" id="leftBtn">◀</div><div class="btn" id="rightBtn">▶</div></div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d", { alpha: false });
const WORLD_SIZE = 3600;

let snakes = [], particles = [], turnDir = 0, isAdmin = false, superMode = false;
let camera = { x: 0, y: 0 }, baseSpeed = 10;
const botNames = ["Efe_Pro", "Zeynep_X", "SnakeKing", "Mert_07", "Can_Slayer", "Ghost", "Alpha", "Ninja", "Reis", "Sero"];

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = resize; resize();

function spawnParticle(x, y, color, size = 4, value = 1, scatter = false) {
    let px = x ?? Math.random() * WORLD_SIZE;
    let py = y ?? Math.random() * WORLD_SIZE;
    if(scatter) { 
        px += (Math.random() - 0.5) * 150; // Saçılma alanını daha da genişlettim
        py += (Math.random() - 0.5) * 150;
    }
    return { 
        x: px, y: py, 
        color: color ?? `hsl(${Math.random()*360}, 80%, 50%)`, 
        size: size, // Boyut küçüldü (Normal: 4, Patlama: 6)
        value: value 
    };
}

function spawnBot() {
    return {
        name: botNames[Math.floor(Math.random()*botNames.length)],
        color: `hsl(${Math.random()*360}, 60%, 50%)`,
        x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE,
        angle: Math.random()*Math.PI*2, score: 20, segments: [], alive: true, isBot: true, aiTimer: 0
    };
}

for(let i=0; i<12; i++) snakes.push(spawnBot());
for(let i=0; i<250; i++) particles.push(spawnParticle());

function toggleSuperMode() {
    if(!isAdmin) return;
    superMode = !superMode;
    const btn = document.getElementById("superToggle");
    btn.style.background = superMode ? "#006622" : "#440000";
}

window.onkeydown = (e) => {
    if(e.key.toLowerCase() === "g") toggleSuperMode();
    if(e.key === "ArrowLeft") turnDir = -0.15;
    if(e.key === "ArrowRight") turnDir = 0.15;
};
window.onkeyup = () => turnDir = 0;

function handleDeath(s) {
    if(!s.alive) return;
    s.alive = false;
    // Yemleri küçük ve çok dağınık bırak
    for(let i=0; i < s.segments.length; i += 5) { 
        particles.push(spawnParticle(s.segments[i].x, s.segments[i].y, s.color, 6, 4, true));
    }
    if(!s.isBot) document.getElementById("menu").style.display = "block";
}

function startGame(mode) {
    let name = document.getElementById("nameInput").value.trim();
    baseSpeed = mode === 'easy' ? 7 : mode === 'medium' ? 10 : 14;
    isAdmin = (name === "Ali Kemal" || name === "Alihan Yeşil");
    document.getElementById("superToggle").style.display = isAdmin ? "block" : "none";
    snakes = snakes.filter(s => s.isBot);
    snakes.push({ name: name || "Oyuncu", color: isAdmin ? "#00ffff" : "#ff5500", x: WORLD_SIZE/2, y: WORLD_SIZE/2, angle: 0, score: 0, segments: [], alive: true, isBot: false });
    document.getElementById("menu").style.display = "none";
}

function update() {
    let player = snakes.find(s => !s.isBot && s.alive);
    if(player) { camera.x = player.x - canvas.width/2; camera.y = player.y - canvas.height/2; }

    snakes.forEach(s => {
        if(!s.alive) { if(s.isBot) { Object.assign(s, spawnBot()); s.segments = []; } return; }
        let speed = (!s.isBot && isAdmin && superMode) ? 20 : (s.isBot ? 8.5 : baseSpeed);
        
        if(s.isBot) {
            s.aiTimer--;
            if(s.aiTimer <= 0) {
                s.targetAngle = Math.random() * Math.PI * 2;
                s.aiTimer = 80;
            }
            let diff = s.targetAngle - s.angle;
            while(diff < -Math.PI) diff += Math.PI*2;
            while(diff > Math.PI) diff -= Math.PI*2;
            s.angle += diff * 0.08;
        } else { s.angle += turnDir; }

        s.x += Math.cos(s.angle) * speed;
        s.y += Math.sin(s.angle) * speed;

        if(s.x < 0 || s.x > WORLD_SIZE || s.y < 0 || s.y > WORLD_SIZE) {
            if(!s.isBot && isAdmin && superMode) { s.x = Math.max(0, Math.min(WORLD_SIZE, s.x)); s.y = Math.max(0, Math.min(WORLD_SIZE, s.y)); }
            else { handleDeath(s); }
        }

        s.segments.unshift({x: s.x, y: s.y});
        if(s.segments.length > s.score + 12) s.segments.pop();

        // Yem yeme (Yemler küçüldüğü için mesafe ayarlandı)
        for(let i = particles.length - 1; i >= 0; i--) {
            if(Math.abs(s.x - particles[i].x) < 28 && Math.abs(s.y - particles[i].y) < 28) {
                s.score += particles[i].value;
                particles.splice(i, 1);
                if(particles.length < 250) particles.push(spawnParticle());
                if(!s.isBot) document.getElementById("scoreBox").innerText = "Puan: " + s.score;
            }
        }

        snakes.forEach(other => {
            if(!other.alive || s === other) return;
            if(Math.abs(s.x - other.x) < 400 && Math.abs(s.y - other.y) < 400) {
                for(let i=5; i < other.segments.length; i+=2) {
                    if(Math.hypot(s.x - other.segments[i].x, s.y - other.segments[i].y) < 20) {
                        if(!s.isBot && isAdmin && superMode) { handleDeath(other); s.score += 10; } 
                        else { handleDeath(s); }
                        break;
                    }
                }
            }
        });
    });
}

function draw() {
    ctx.fillStyle = "#050505";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-camera.x, -camera.y);
    
    // Grid
    ctx.strokeStyle = "#111"; ctx.lineWidth = 1;
    let startX = Math.floor(camera.x / 200) * 200;
    let startY = Math.floor(camera.y / 200) * 200;
    for(let x=startX; x < startX + canvas.width + 200; x+=200) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, WORLD_SIZE); ctx.stroke(); }
    for(let y=startY; y < startY + canvas.height + 200; y+=200) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(WORLD_SIZE, y); ctx.stroke(); }

    ctx.strokeStyle = "#400"; ctx.lineWidth = 5; ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);
    
    // Küçük Yemler
    particles.forEach(p => {
        if(p.x > camera.x - 10 && p.x < camera.x + canvas.width + 10 && p.y > camera.y - 10 && p.y < camera.y + canvas.height + 10) {
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        }
    });

    // Yılanlar
    snakes.forEach(s => {
        if(!s.alive) return;
        ctx.fillStyle = s.color;
        for(let i=0; i < s.segments.length; i+= (i===0 ? 1 : 2)) {
            let seg = s.segments[i];
            if(seg.x > camera.x - 40 && seg.x < camera.x + canvas.width + 40 && seg.y > camera.y - 40 && seg.y < camera.y + canvas.height + 40) {
                ctx.beginPath(); ctx.arc(seg.x, seg.y, i===0 ? 20 : 15, 0, Math.PI*2); ctx.fill();
            }
        }
        if(s.x > camera.x && s.x < camera.x + canvas.width) {
            ctx.fillStyle = "white"; ctx.font = "bold 13px Arial"; ctx.fillText(s.name, s.x - 20, s.y - 32);
        }
    });
    ctx.restore();

    let top = snakes.filter(s => s.alive).sort((a,b) => b.score - a.score).slice(0, 5);
    let html = "<b>LİDERLER</b><br>";
    top.forEach((ts, i) => html += `<div class="row" style="color:${ts.color}">${i+1}. ${ts.name.substring(0,8)} <span>${ts.score}</span></div>`);
    document.getElementById("leaderRows").innerHTML = html;
}

document.getElementById("leftBtn").ontouchstart = (e) => { e.preventDefault(); turnDir = -0.15; };
document.getElementById("rightBtn").ontouchstart = (e) => { e.preventDefault(); turnDir = 0.15; };
document.getElementById("leftBtn").ontouchend = document.getElementById("rightBtn").ontouchend = () => turnDir = 0;

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
