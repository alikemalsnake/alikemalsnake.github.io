<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ali Kemal Snake - Ultra Renkli</title>
<style>
  body { background: #000; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow: hidden; }
  canvas { display: block; background: #080808; }
  #ui { position: fixed; top: 20px; left: 20px; z-index: 100; pointer-events: none; }
  #scoreBox { font-size: 35px; color: #00ff00; font-weight: bold; text-shadow: 2px 2px 5px #000; }
  #godTag { display: none; color: white; background: red; padding: 10px 20px; border-radius: 10px; margin-top: 10px; font-weight: bold; border: 3px solid white; box-shadow: 0 0 20px red; }
  #leaderboard { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.85); padding: 15px; border: 3px solid #ffd700; border-radius: 15px; min-width: 200px; }
  .row { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; font-size: 16px; }
  #menu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 200; background: #1a1a1a; padding: 50px; border-radius: 30px; text-align: center; border: 6px solid #ffd700; box-shadow: 0 0 50px rgba(255,215,0,0.3); }
  input { font-size: 22px; padding: 15px; border-radius: 12px; margin: 20px; text-align: center; width: 85%; background: #000; color: #00ff00; border: 2px solid #ffd700; }
  button { font-size: 25px; padding: 15px 50px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 15px; font-weight: bold; transition: 0.2s; }
  button:hover { background: #218838; transform: scale(1.1); }
</style>
</head>
<body>

<div id="ui">
    <div id="scoreBox">Puan: 0</div>
    <div id="godTag">🛡️ ÖLÜMSÜZ MOD AKTİF</div>
</div>

<div id="leaderboard">
    <h3 style="margin:0 0 10px 0; color:#ffd700; text-align:center;">LİDERLER</h3>
    <div id="leaderRows"></div>
</div>

<div id="menu">
  <h1 style="color:#ffd700; font-size: 45px; margin:0;">SNAKE.IO</h1>
  <p style="color:#aaa;">İsmini yaz ve maceraya başla!</p>
  <input type="text" id="nameInput" placeholder="Buraya yaz..." maxlength="15">
  <br>
  <button onclick="startGame()">BAŞLAT</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const WORLD_SIZE = 3500;

let snakes = [], particles = [], gameActive = false, turnDir = 0, godMode = false, isAdmin = false;
let camera = { x: 0, y: 0 };

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

function getRandomColor() {
    return `hsl(${Math.random() * 360}, 100%, 50%)`;
}

const botNames = ["Ahmet", "Mehmet", "Can", "Ece", "Mert", "Deniz", "Selim", "Arda", "Zeynep", "Melis", "Emre", "Burak", "Selin", "Kaan", "Umut"];

function startGame() {
    let name = document.getElementById("nameInput").value.trim();
    if(name === "Ali Kemal") {
        isAdmin = true;
        name = "Ali Kemal [Admin]";
    } else {
        isAdmin = false;
    }
    
    godMode = false;
    document.getElementById("godTag").style.display = "none";
    document.getElementById("menu").style.display = "none";
    gameActive = true;
    init(name || "Oyuncu");
}

function init(pName) {
    snakes = []; particles = [];
    
    // Senin yılanın
    snakes.push({
        name: pName, color: isAdmin ? "#00ff00" : getRandomColor(),
        x: WORLD_SIZE/2, y: WORLD_SIZE/2, angle: 0, score: 0, segments: [], alive: true, isBot: false
    });

    // Renkli ve Farklı İsimli Botlar
    for(let i=0; i<20; i++) {
        let rName = botNames[Math.floor(Math.random()*botNames.length)] + "_" + Math.floor(Math.random()*99);
        snakes.push({
            name: rName, color: getRandomColor(),
            x: Math.random()*(WORLD_SIZE-400)+200, y: Math.random()*(WORLD_SIZE-400)+200,
            angle: Math.random()*Math.PI*2, score: 8, segments: [], alive: true, isBot: true
        });
    }

    // Gökkuşağı Yemler
    for(let i=0; i<500; i++) spawnParticle();
    requestAnimationFrame(loop);
}

function spawnParticle() {
    particles.push({
        x: Math.random()*(WORLD_SIZE-100)+50,
        y: Math.random()*(WORLD_SIZE-100)+50,
        color: getRandomColor(),
        size: Math.random()*4 + 4
    });
}

window.onkeydown = (e) => {
    let k = e.key.toLowerCase();
    if(k === "arrowleft") turnDir = -0.1;
    if(k === "arrowright") turnDir = 0.1;
    if(k === "g" && isAdmin) {
        godMode = !godMode;
        document.getElementById("godTag").style.display = godMode ? "block" : "none";
    }
};
window.onkeyup = () => turnDir = 0;

function loop() {
    if(!gameActive) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    snakes.forEach(s => {
        if(!s.alive) return;
        
        s.angle += s.isBot ? (Math.random()-0.5)*0.25 : turnDir;
        s.x += Math.cos(s.angle) * 6;
        s.y += Math.sin(s.angle) * 6;

        // Kırmızı Duvar Ölümü
        if(s.x < 0 || s.x > WORLD_SIZE || s.y < 0 || s.y > WORLD_SIZE) {
            if(s.isBot || !godMode) {
                s.alive = false;
                if(!s.isBot) setTimeout(() => location.reload(), 1000);
            } else {
                if(s.x < 0) s.x = 0; if(s.x > WORLD_SIZE) s.x = WORLD_SIZE;
                if(s.y < 0) s.y = 0; if(s.y > WORLD_SIZE) s.y = WORLD_SIZE;
            }
        }

        s.segments.unshift({x: s.x, y: s.y});
        if(s.segments.length > s.score + 15) s.segments.pop();

        // Renkli Yemleri Yeme
        particles.forEach((p, i) => {
            if(Math.hypot(s.x-p.x, s.y-p.y) < 25) {
                particles.splice(i, 1);
                s.score++;
                if(!s.isBot) document.getElementById("scoreBox").innerText = "Puan: " + s.score;
                spawnParticle();
            }
        });

        // Çarpışma Kontrolü
        snakes.forEach(other => {
            if(s === other || !other.alive) return;
            other.segments.forEach((p, idx) => {
                if(idx > 4 && Math.hypot(s.x - p.x, s.y - p.y) < 14) {
                    if(s.isBot || !godMode) {
                        s.alive = false;
                        if(!s.isBot) setTimeout(() => location.reload(), 1000);
                    }
                }
            });
        });
    });

    let me = snakes[0];
    camera.x = me.x - canvas.width/2;
    camera.y = me.y - canvas.height/2;

    let sorted = [...snakes].sort((a,b) => b.score - a.score).slice(0, 5);
    let html = "";
    sorted.forEach((s, i) => {
        html += `<div class="row" style="color:${s.color}"><span>${i+1}. ${s.name}</span><span>${s.score}</span></div>`;
    });
    document.getElementById("leaderRows").innerHTML = html;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#080808";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // Kırmızı Sınırlar (Duvarlar)
    ctx.strokeStyle = "red";
    ctx.lineWidth = 20;
    ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);

    // Renkli Yemler
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fill();
    });

    // Renkli Yılanlar
    snakes.forEach(s => {
        if(!s.alive) return;
        ctx.fillStyle = s.color;
        
        if(!s.isBot && godMode) {
            ctx.shadowBlur = 25;
            ctx.shadowColor = "white";
        }

        s.segments.forEach((seg, i) => {
            ctx.beginPath();
            ctx.arc(seg.x, seg.y, i === 0 ? 18 : 14, 0, Math.PI*2);
            ctx.fill();
        });
        
        ctx.shadowBlur = 0;
        ctx.fillStyle = "white";
        ctx.font = "bold 16px Arial";
        ctx.fillText(s.name, s.x - 30, s.y - 30);
    });

    ctx.restore();
}
</script>
</body>
</html>
