<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ali Kemal Ölümsüz Arena</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  body { background: #000; color: white; font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none; }
  #viewport { width: 100vw; height: 100vh; overflow: hidden; position: relative; }
  canvas { background: #050505; position: absolute; border: 5px solid #333; }
  .screen { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; background: rgba(0,0,0,0.9); padding: 30px; border-radius: 20px; text-align: center; border: 2px solid #00ff00; }
  .active { display: block; }
  input { font-size: 20px; padding: 10px; border-radius: 10px; border: none; margin: 10px; width: 220px; text-align: center; }
  button { font-size: 22px; padding: 10px 30px; border-radius: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
  #ui { position: fixed; top: 10px; left: 10px; z-index: 50; pointer-events: none; }
  
  /* MOBİL TUŞLAR */
  .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; z-index: 100; }
  @media (max-width: 768px) { .controls { display: grid; } }
  .btn-dir { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; color: white; }
</style>
</head>
<body>

<div id="ui">
    <div id="scoreBox" style="font-size: 24px; color: #00ff00;">Puan: 0</div>
    <div id="status" style="color: gold; font-weight: bold;"></div>
</div>

<div id="menu" class="screen active">
  <h1 style="color:#00ff00;">ÖLÜMSÜZ ARENA</h1>
  <p>Kimseye Çarparak Ölmezsin, Sadece Puan Topla!</p>
  <input type="text" id="nameInput" placeholder="Adın..." maxlength="12"><br>
  <button onclick="goGame()">SAVAŞA KATIL</button>
</div>

<div id="viewport">
    <canvas id="gameCanvas"></canvas>
</div>

<div class="controls">
    <div style="grid-column:2" class="btn-dir" onclick="setDir('UP')">⬆️</div>
    <div style="grid-column:1" class="btn-dir" onclick="setDir('LEFT')">⬅️</div>
    <div style="grid-column:2" class="btn-dir" onclick="setDir('DOWN')">⬇️</div>
    <div style="grid-column:3" class="btn-dir" onclick="setDir('RIGHT')">➡️</div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const WORLD_SIZE = 4000; // Haritayı iyice büyüttük!
const box = 20;
canvas.width = WORLD_SIZE;
canvas.height = WORLD_SIZE;

let snakes = [];
let particles = [];
let isAdmin = false;

function goGame() {
    const name = document.getElementById("nameInput").value.trim() || "Savaşçı";
    if (name.toLowerCase() === "ali kemal") {
        isAdmin = true;
        document.getElementById("status").innerText = "👑 ADMIN";
    }
    document.getElementById("menu").style.display = "none";
    initGame(name);
}

function initGame(playerName) {
    snakes = [];
    particles = [];
    
    // Oyuncu
    snakes.push(createSnake(playerName, "#00ff00", false));
    
    // 30 TANE BOT!
    for(let i=0; i<30; i++) {
        snakes.push(createSnake("Bot_"+i, `hsl(${Math.random()*360}, 70%, 50%)`, true));
    }

    // 500 Tane Yem
    for(let i=0; i<500; i++) spawnParticle();

    setInterval(draw, 90);
}

function createSnake(name, color, isBot) {
    return {
        name: name,
        body: [{x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE}],
        dir: "RIGHT",
        color: color,
        isBot: isBot,
        score: 0
    };
}

function spawnParticle() {
    particles.push({
        x: Math.random() * WORLD_SIZE,
        y: Math.random() * WORLD_SIZE,
        color: `hsl(${Math.random()*360}, 100%, 50%)`
    });
}

function setDir(d) {
    let s = snakes[0];
    if(d==="UP" && s.dir!=="DOWN") s.dir = "UP";
    if(d==="DOWN" && s.dir!=="UP") s.dir = "DOWN";
    if(d==="LEFT" && s.dir!=="RIGHT") s.dir = "LEFT";
    if(d==="RIGHT" && s.dir!=="LEFT") s.dir = "RIGHT";
}

document.addEventListener("keydown", e => {
    if(e.key === "ArrowUp") setDir("UP");
    if(e.key === "ArrowDown") setDir("DOWN");
    if(e.key === "ArrowLeft") setDir("LEFT");
    if(e.key === "ArrowRight") setDir("RIGHT");
});

function draw() {
    ctx.fillStyle = "#050505";
    ctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);

    // Yemekler
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
        ctx.fill();
    });

    snakes.forEach(s => {
        // Bot Hareketi
        if (s.isBot && Math.random() < 0.1) {
            const dirs = ["UP", "DOWN", "LEFT", "RIGHT"];
            let next = dirs[Math.floor(Math.random()*4)];
            if((next==="UP" && s.dir!=="DOWN") || (next==="DOWN" && s.dir!=="UP") || (next==="LEFT" && s.dir!=="RIGHT") || (next==="RIGHT" && s.dir!=="LEFT")) s.dir = next;
        }

        let head = { ...s.body[0] };
        if (s.dir === "UP") head.y -= box;
        if (s.dir === "DOWN") head.y += box;
        if (s.dir === "LEFT") head.x -= box;
        if (s.dir === "RIGHT") head.x += box;

        // Haritadan çıkınca diğer taraftan gel (Ölümsüzlük)
        if (head.x < 0) head.x = WORLD_SIZE - box;
        if (head.x >= WORLD_SIZE) head.x = 0;
        if (head.y < 0) head.y = WORLD_SIZE - box;
        if (head.y >= WORLD_SIZE) head.y = 0;

        s.body.unshift(head);

        // Yemek yeme
        let ate = false;
        particles.forEach((p, i) => {
            if (Math.abs(head.x - p.x) < box && Math.abs(head.y - p.y) < box) {
                particles.splice(i, 1);
                ate = true;
                s.score += 1;
                if(!s.isBot) document.getElementById("scoreBox").innerText = "Puan: " + s.score;
                spawnParticle();
            }
        });

        if (!ate) s.body.pop();

        // Çizim
        s.body.forEach((p, i) => {
            ctx.fillStyle = i === 0 ? "white" : s.color;
            ctx.fillRect(p.x, p.y, box-2, box-2);
        });
        ctx.fillStyle = "white";
        ctx.fillText(s.name, head.x, head.y - 10);
    });

    // Kamera Takibi
    const myS = snakes[0];
    const v = document.getElementById("viewport");
    canvas.style.left = (v.offsetWidth/2 - myS.body[0].x) + "px";
    canvas.style.top = (v.offsetHeight/2 - myS.body[0].y) + "px";
}
</script>
</body>
</html>
